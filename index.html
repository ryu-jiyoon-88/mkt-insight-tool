<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Insight Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .roas-card { transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center md:text-left">
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">🚀 AE Marketing Command Center</h1>
            <p class="text-slate-500 mt-2">지윤님만의 마케팅 효율화 도구 모음</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 roas-card">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-emerald-600">📊 ROAS 계산기</h2>
                    <span id="status-dot" class="h-3 w-3 rounded-full bg-slate-300"></span>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs font-semibold text-slate-400 uppercase">광고비 (원)</label>
                        <input id="spend" type="number" oninput="calcROAS()" placeholder="예: 1000000" class="w-full p-3 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-slate-400 uppercase">매출액 (원)</label>
                        <input id="revenue" type="number" oninput="calcROAS()" placeholder="예: 5000000" class="w-full p-3 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div class="mt-6 p-4 bg-emerald-50 rounded-xl text-center">
                        <span class="block text-sm text-emerald-600 font-medium">실시간 ROAS</span>
                        <span id="roas-result" class="text-4xl font-black text-emerald-700">0%</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                <h2 class="text-xl font-bold text-blue-600 mb-4">🔗 UTM 생성기</h2>
                <div class="space-y-3">
                    <input id="url" type="text" placeholder="기본 URL (https://...)" class="w-full p-3 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <input id="source" type="text" placeholder="Source (naver, meta 등)" class="w-full p-3 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <button onclick="generateUTM()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">링크 복사하기</button>
                    <p id="result" class="mt-2 p-2 text-[10px] break-all text-slate-400 italic"></p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100">
                <h2 class="text-xl font-bold text-purple-600 mb-4">📝 전략 메모</h2>
                <textarea id="memo" class="w-full h-40 p-3 bg-slate-50 border-none rounded-lg focus:ring-2 focus:ring-purple-500 outline-none text-sm" placeholder="오늘의 인사이트를 기록하세요..."></textarea>
                <button onclick="saveMemo()" class="w-full mt-3 bg-purple-600 text-white py-2 rounded-lg font-medium hover:bg-purple-700 transition">자동 저장</button>
            </div>

        </div>
    </div>

    <script>
        // ROAS 계산 함수
        function calcROAS() {
            const spend = parseFloat(document.getElementById('spend').value);
            const revenue = parseFloat(document.getElementById('revenue').value);
            const resultDisplay = document.getElementById('roas-result');
            const dot = document.getElementById('status-dot');

            if (spend > 0 && revenue >= 0) {
                const roas = (revenue / spend) * 100;
                resultDisplay.innerText = roas.toLocaleString(undefined, {maximumFractionDigits: 1}) + '%';
                
                // ROAS 수치에 따른 색상 변화 (가이드라인)
                if(roas >= 500) {
                    resultDisplay.className = "text-4xl font-black text-blue-600";
                    dot.className = "h-3 w-3 rounded-full bg-blue-500 animate-pulse";
                } else if(roas >= 300) {
                    resultDisplay.className = "text-4xl font-black text-emerald-600";
                    dot.className = "h-3 w-3 rounded-full bg-emerald-500";
                } else {
                    resultDisplay.className = "text-4xl font-black text-rose-500";
                    dot.className = "h-3 w-3 rounded-full bg-rose-500";
                }
            } else {
                resultDisplay.innerText = '0%';
                resultDisplay.className = "text-4xl font-black text-slate-300";
                dot.className = "h-3 w-3 rounded-full bg-slate-300";
            }
        }

        // UTM 생성 함수
        function generateUTM() {
            const url = document.getElementById('url').value;
            const source = document.getElementById('source').value;
            if(!url || !source) return alert('URL과 Source를 입력해주세요!');
            const utm = `${url}${url.includes('?') ? '&' : '?'}utm_source=${source}&utm_medium=cpc`;
            
            navigator.clipboard.writeText(utm).then(() => {
                document.getElementById('result').innerText = "복사완료: " + utm;
                alert('UTM 링크가 클립보드에 복사되었습니다!');
            });
        }

        // 메모 저장 함수
        function saveMemo() {
            const memo = document.getElementById('memo').value;
            localStorage.setItem('mkt_memo', memo);
            alert('인사이트가 브라우저에 저장되었습니다.');
        }

        window.onload = () => {
            document.getElementById('memo').value = localStorage.getItem('mkt_memo') || '';
        }
    </script>
</body>
</html>
