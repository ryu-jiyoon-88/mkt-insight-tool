<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Insight Engine - Official v6.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        :root { --main-blue: #2563eb; --point-emerald: #10b981; --bg-creamy: #f8fafc; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-creamy); color: #1e293b; letter-spacing: -0.03em; }
        
        .premium-card { background: #fff; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; }
        .input-box { width: 100%; padding: 12px 16px; border-radius: 14px; border: 1px solid #e2e8f0; font-weight: 700; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--main-blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .btn-action { padding: 10px; border-radius: 12px; font-weight: 800; font-size: 0.8rem; background: #f1f5f9; transition: 0.2s; border: 1px solid transparent; }
        .btn-action:hover { background: #fff; border-color: #cbd5e1; transform: translateY(-1px); }
        
        .color-chip { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; transition: 0.2s; border: 2px solid #fff; box-shadow: 0 0 0 1px #e2e8f0; }
        .color-chip.active { transform: scale(1.3); box-shadow: 0 0 0 2px var(--main-blue); }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-[1400px] mx-auto">
        <header class="flex justify-between items-end mb-8 px-2">
            <div>
                <h1 class="text-3xl font-black italic flex items-center gap-3 tracking-tighter">
                    <span class="text-blue-600">📊</span> 성과 분석 그래프
                </h1>
                <p class="text-slate-400 font-bold text-sm mt-1">ROAS를 중심으로 분석된 데이터 리포트입니다.</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex gap-2 bg-white p-2 rounded-full shadow-sm border border-slate-100">
                    <div onclick="changeTheme('#10b981', this)" class="color-chip active" style="background: #10b981;"></div>
                    <div onclick="changeTheme('#f43f5e', this)" class="color-chip" style="background: #f43f5e;"></div>
                    <div onclick="changeTheme('#2563eb', this)" class="color-chip" style="background: #2563eb;"></div>
                    <div onclick="changeTheme('#f59e0b', this)" class="color-chip" style="background: #f59e0b;"></div>
                </div>
                <button onclick="saveChart()" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-black text-xs hover:opacity-90 transition">PNG 저장</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="space-y-6">
                <div class="premium-card p-6">
                    <h2 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">Keyword Search</h2>
                    <input id="kw-input" type="text" placeholder="검색어 입력" class="input-box mb-3">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="goSearch('naver')" class="btn-action">네이버</button>
                        <button onclick="goSearch('black')" class="btn-action">블랙키위</button>
                        <button onclick="goSearch('insta')" class="btn-action">인스타</button>
                        <button onclick="goSearch('tube')" class="btn-action">유튜브</button>
                    </div>
                </div>

                <div class="premium-card p-6 border-l-4 border-l-emerald-400">
                    <h2 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">ROAS Calculator</h2>
                    <div class="space-y-3">
                        <input id="c-cost" type="number" oninput="calc()" placeholder="광고비(원)" class="input-box">
                        <input id="c-rev" type="number" oninput="calc()" placeholder="매출액(원)" class="input-box">
                        <div class="text-center pt-2">
                            <span id="c-res" class="text-4xl font-black text-emerald-500">0%</span>
                        </div>
                    </div>
                </div>

                <div class="premium-card p-6">
                    <h2 class="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">Target Revenue</h2>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <input id="t-cost" type="number" oninput="calc()" placeholder="예산" class="input-box">
                        <input id="t-roas" type="number" oninput="calc()" placeholder="목표%" class="input-box">
                    </div>
                    <p id="t-res" class="text-right font-black text-slate-400">0원</p>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="premium-card p-8 h-full min-h-[600px] flex flex-col">
                    <div id="drop-area" onclick="document.getElementById('xl-file').click()" class="flex-1 border-2 border-dashed border-slate-200 rounded-[32px] flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50 transition-all group">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-2xl mb-4 group-hover:scale-110 transition">📂</div>
                        <p class="font-black text-slate-400">엑셀 파일을 드래그하거나 클릭하여 업로드</p>
                        <p class="text-[10px] text-slate-300 font-bold mt-2 uppercase">광고비, 매출액, 로아스 자동 매핑 시스템</p>
                        <input type="file" id="xl-file" class="hidden" onchange="process(this.files)">
                    </div>
                    
                    <div id="chart-box" class="hidden w-full h-[550px]">
                        <canvas id="mainChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chart = null, curColor = '#10b981', raw = null;
        const MAP = {
            rev: ['매출', '수익', '구매완료매출', '결제액', 'Revenue', 'Sales'],
            cost: ['광고비', '지출', '총금액', '집행비', 'Cost', 'Spend'],
            roas: ['로아스', '수익률', 'ROAS', '효율']
        };

        function changeTheme(c, el) {
            curColor = c;
            document.querySelectorAll('.color-chip').forEach(x => x.classList.remove('active'));
            el.classList.add('active');
            if(raw) render(raw);
        }

        function goSearch(t) {
            const v = document.getElementById('kw-input').value;
            if(!v) return alert('키워드를 입력하세요');
            const url = { naver: `https://search.naver.com/search.naver?query=${v}`, black: `https://blackkiwi.net/service/check-keyword?keyword=${v}`, insta: `https://www.instagram.com/explore/tags/${v}/`, tube: `https://www.youtube.com/results?search_query=${v}` };
            window.open(url[t]);
        }

        function calc() {
            const c1 = parseFloat(document.getElementById('c-cost').value) || 0, r1 = parseFloat(document.getElementById('c-rev').value) || 0;
            if(c1 > 0) document.getElementById('c-res').innerText = Math.round((r1/c1)*100) + '%';
            const c2 = parseFloat(document.getElementById('t-cost').value) || 0, tr = parseFloat(document.getElementById('t-roas').value) || 0;
            if(c2 > 0) document.getElementById('t-res').innerText = Math.round(c2*(tr/100)).toLocaleString() + '원';
        }

        function process(files) {
            const r = new FileReader();
            r.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                
                const head = json[0];
                let idx = { x: 0, r: -1, c: -1, rs: -1 };
                head.forEach((h, i) => {
                    const txt = String(h).replace(/\s/g, '');
                    if(MAP.rev.some(k => txt.includes(k))) idx.r = i;
                    else if(MAP.cost.some(k => txt.includes(k))) idx.c = i;
                    else if(MAP.roas.some(k => txt.includes(k))) idx.rs = i;
                    else if(txt.includes('날짜') || txt.includes('시간')) idx.x = i;
                });

                const parsed = { labels: [], rev: [], cost: [], roas: [] };
                for(let i=1; i<json.length; i++) {
                    if(!json[i][idx.x] && !json[i][idx.r]) continue;
                    parsed.labels.push(json[i][idx.x] || `${i}행`);
                    // 숫자 파싱 로직 강화: 콤마, 원화기호 등 제거
                    const num = (v) => parseFloat(String(v || 0).replace(/[^0-9.-]+/g, ""));
                    parsed.rev.push(num(json[i][idx.r]));
                    parsed.cost.push(num(json[i][idx.c]));
                    parsed.roas.push(num(json[i][idx.rs]));
                }
                raw = parsed;
                render(parsed);
            };
            r.readAsArrayBuffer(files[0]);
        }

        function render(d) {
            document.getElementById('drop-area').classList.add('hidden');
            document.getElementById('chart-box').classList.remove('hidden');
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(chart) chart.destroy();

            chart = new Chart(ctx, {
                data: {
                    labels: d.labels,
                    datasets: [
                        { type: 'line', label: 'ROAS (%)', data: d.roas, borderColor: curColor, backgroundColor: curColor, borderWidth: 4, pointRadius: 5, pointBackgroundColor: '#fff', pointBorderWidth: 3, yAxisID: 'y2', zIndex: 10, tension: 0.2 },
                        { type: 'bar', label: '매출액', data: d.rev, backgroundColor: curColor + '33', borderRadius: 8, yAxisID: 'y1' },
                        { type: 'line', label: '광고비', data: d.cost, borderColor: '#cbd5e1', borderDash: [5, 5], borderWidth: 2, pointRadius: 0, fill: false, yAxisID: 'y1', tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y1: { type: 'linear', position: 'left', grid: { color: '#f1f5f9' }, ticks: { font: { weight: 'bold' } } },
                        y2: { type: 'linear', position: 'right', grid: { display: false }, ticks: { color: curColor, font: { weight: 'bold' } } }
                    },
                    plugins: { legend: { position: 'top', align: 'end', labels: { usePointStyle: true, font: { weight: 'bold' } } } }
                }
            });
        }

        function saveChart() {
            const a = document.createElement('a');
            a.href = document.getElementById('mainChart').toDataURL('image/png');
            a.download = 'Report.png';
            a.click();
        }
    </script>
</body>
</html>
