<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Marketing Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tool-card { @apply bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 transition-all hover:shadow-md; }
        .theme-btn { @apply flex flex-col items-center gap-2 p-3 rounded-2xl border-2 border-transparent transition-all cursor-pointer hover:bg-slate-50; }
        .theme-btn.active { @apply border-slate-900 bg-slate-50; }
        .color-preview { @apply w-12 h-6 rounded-full shadow-inner; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 font-sans text-slate-900">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-8">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tight italic">🚀 AE Command Center</h1>
                <p class="text-slate-500 mt-2 font-medium">Performance Strategy Dashboard</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-slate-300">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <div class="tool-card lg:col-span-2">
                <h2 class="text-xl font-bold text-indigo-600 mb-6 flex items-center gap-2">🔍 실시간 트렌드 체크</h2>
                <input id="search-brand" type="text" placeholder="분석할 업체명을 입력하세요" class="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold mb-6 border border-slate-100 text-lg">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="monitor('blog')" class="py-4 px-2 rounded-2xl bg-green-50 text-green-700 border border-green-100 font-bold hover:bg-green-100 transition text-sm">🟢 블로그</button>
                    <button onclick="monitor('cafe')" class="py-4 px-2 rounded-2xl bg-emerald-50 text-emerald-700 border border-emerald-100 font-bold hover:bg-emerald-100 transition text-sm">☕ 카페</button>
                    <button onclick="monitor('datalab')" class="py-4 px-2 rounded-2xl bg-blue-50 text-blue-700 border border-blue-200 font-bold hover:bg-blue-100 transition text-sm">📉 데이터랩</button>
                    <button onclick="monitor('insta')" class="py-4 px-2 rounded-2xl bg-pink-50 text-pink-700 border border-pink-200 font-bold hover:bg-pink-100 transition text-sm">📸 인스타</button>
                </div>
            </div>

            <div class="tool-card">
                <h2 class="text-xl font-bold text-slate-800 mb-6 italic">💰 실시간 퀵 계산기</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="roas-spend" type="number" oninput="calcAll()" placeholder="광고비" class="p-3 bg-slate-50 rounded-xl outline-none text-sm border border-slate-100 font-bold">
                        <input id="roas-revenue" type="number" oninput="calcAll()" placeholder="매출액" class="p-3 bg-slate-50 rounded-xl outline-none text-sm border border-slate-100 font-bold">
                    </div>
                    <div id="roas-box" class="p-4 bg-slate-50 rounded-2xl text-center border border-slate-100">
                        <span class="block text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Current ROAS</span>
                        <span id="roas-res" class="text-3xl font-black text-slate-300 font-mono">0%</span>
                    </div>
                    <div class="pt-2 border-t border-dashed">
                        <label class="text-xs font-bold text-orange-500 mb-2 block tracking-tighter">목표 ROAS 설정 시 필요 매출액</label>
                        <input id="t-roas" type="number" oninput="calcAll()" placeholder="목표 ROAS (%)" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm border border-slate-100 font-bold">
                        <div id="target-res" class="mt-2 text-right font-black text-orange-600 font-mono">0원</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tool-card relative">
            <div class="flex flex-col md:flex-row justify-between items-start mb-10 gap-8">
                <div>
                    <h2 class="text-3xl font-black text-slate-800">📊 Performance Analysis</h2>
                    <p class="text-slate-400 text-sm mt-1 font-medium italic">ROAS를 중심으로 분석된 시간대별 성과 지표입니다.</p>
                </div>
                
                <div class="flex gap-4 p-4 bg-slate-50 rounded-[2rem] border border-slate-100">
                    <div onclick="changeTheme('indigo', this)" class="theme-btn active">
                        <div class="color-preview bg-indigo-500"></div>
                        <span class="text-[10px] font-bold text-slate-500">INDIGO</span>
                    </div>
                    <div onclick="changeTheme('rose', this)" class="theme-btn">
                        <div class="color-preview bg-rose-500"></div>
                        <span class="text-[10px] font-bold text-slate-500">ROSE</span>
                    </div>
                    <div onclick="changeTheme('emerald', this)" class="theme-btn">
                        <div class="color-preview bg-emerald-500"></div>
                        <span class="text-[10px] font-bold text-slate-500">EMERALD</span>
                    </div>
                    <div onclick="changeTheme('amber', this)" class="theme-btn">
                        <div class="color-preview bg-amber-500"></div>
                        <span class="text-[10px] font-bold text-slate-500">AMBER</span>
                    </div>
                    <div class="flex flex-col justify-center pl-2">
                        <button onclick="downloadChart()" class="text-xs bg-slate-800 text-white px-5 py-3 rounded-xl font-bold hover:shadow-lg transition-all active:scale-95">PNG 저장</button>
                    </div>
                </div>
            </div>
            
            <div id="drop-zone" class="w-full h-64 border-2 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-400 hover:border-indigo-300 hover:bg-indigo-50 transition cursor-pointer mb-6 group">
                <div class="bg-white shadow-md p-5 rounded-3xl mb-4 text-4xl group-hover:scale-110 transition-transform">📁</div>
                <span class="text-xl font-black text-slate-600 tracking-tight">CSV 또는 XLSX 파일을 여기로 드롭</span>
                <span class="text-xs text-slate-400 mt-2 font-bold">[시간대별], [총비용], [구매완료 전환매출액] 필드 기준</span>
                <input type="file" id="file-input" accept=".xlsx, .xls, .csv" class="hidden">
            </div>

            <div id="chart-container" class="h-[600px] hidden">
                <canvas id="mkt-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('업체명을 입력해주세요!');
            let url = (type === 'blog') ? `https://search.naver.com/search.naver?where=blog&query=${brand}&sm=tab_opt&nso=so%3Add%2Cp%3A1m` : (type === 'cafe') ? `https://search.naver.com/search.naver?where=article&query=${brand}&sm=tab_opt&nso=so%3Add%2Cp%3A1m` : (type === 'datalab') ? `https://datalab.naver.com/keyword/trendSearch.naver?keywordGroups[0].groupName=${brand}&keywordGroups[0].keywords[0]=${brand}` : `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`; window.open(url, '_blank');
        }

        function calcAll() {
            const spend = parseFloat(document.getElementById('roas-spend').value) || 0;
            const rev = parseFloat(document.getElementById('roas-revenue').value) || 0;
            const tRoas = parseFloat(document.getElementById('t-roas').value) || 0;
            const res = document.getElementById('roas-res');
            if(spend > 0) { const roas = (rev / spend) * 100; res.innerText = Math.round(roas) + '%'; res.className = roas >= 300 ? "text-3xl font-black text-emerald-500 font-mono" : "text-3xl font-black text-rose-500 font-mono"; } else { res.innerText = '0%'; res.className = "text-3xl font-black text-slate-300 font-mono"; }
            document.getElementById('target-res').innerText = (spend > 0 && tRoas > 0) ? Math.round(spend * (tRoas/100)).toLocaleString() + '원' : '0원';
        }

        let myChart = null;
        let currentData = null;
        const themes = {
            indigo: { roas: '#4f46e5', bar: 'rgba(99, 102, 241, 0.3)' },
            rose: { roas: '#e11d48', bar: 'rgba(244, 63, 94, 0.3)' },
            emerald: { roas: '#059669', bar: 'rgba(16, 185, 129, 0.3)' },
            amber: { roas: '#d97706', bar: 'rgba(245, 158, 11, 0.3)' }
        };
        let activeTheme = 'indigo';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => e.preventDefault();
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                currentData = XLSX.utils.sheet_to_json(sheet, {range: 1});
                if(!currentData[0] || !Object.keys(currentData[0]).some(k => k.includes('총비용'))) currentData = XLSX.utils.sheet_to_json(sheet);
                createChart();
            };
            reader.readAsArrayBuffer(file);
        }

        function createChart() {
            if (!currentData) return;
            const findKey = (target) => Object.keys(currentData[0]).find(key => key.replace(/\s/g, '').includes(target.replace(/\s/g, '')));
            const labelKey = findKey('시간대별') || findKey('날짜') || Object.keys(currentData[0])[0];
            const costKey = findKey('총비용');
            const revenueKey = findKey('구매완료전환매출액');

            document.getElementById('chart-container').classList.remove('hidden');
            document.getElementById('drop-zone').classList.add('hidden');

            const labels = currentData.map(r => r[labelKey]);
            const costs = currentData.map(r => parseFloat(String(r[costKey]).replace(/,/g, '')) || 0);
            const revenues = currentData.map(r => parseFloat(String(r[revenueKey]).replace(/,/g, '')) || 0);
            const roasData = costs.map((c, i) => c > 0 ? Math.round((revenues[i] / c) * 100) : 0);

            const ctx = document.getElementById('mkt-chart').getContext('2d');
            if (myChart) myChart.destroy();

            const theme = themes[activeTheme];
            myChart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'ROAS (%)', type: 'line', data: roasData, borderColor: theme.roas, borderWidth: 6, pointRadius: 4, pointBackgroundColor: theme.roas, tension: 0.3, yAxisID: 'y1', order: 0 },
                        { label: '매출액 (Bar)', type: 'bar', data: revenues, backgroundColor: theme.bar, borderRadius: 12, yAxisID: 'y', order: 1 },
                        { label: '광고비', type: 'line', data: costs, borderColor: 'rgba(148, 163, 184, 0.4)', borderWidth: 2, borderDash: [5, 5], pointRadius: 0, tension: 0.4, yAxisID: 'y', order: 2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { position: 'top', labels: { usePointStyle: true, font: { size: 12, weight: 'bold' } } },
                        tooltip: { backgroundColor: 'white', titleColor: '#1e293b', bodyColor: '#1e293b', borderColor: '#e2e8f0', borderWidth: 1, padding: 12, callbacks: { label: (ctx) => ` ${ctx.dataset.label}: ${ctx.dataset.label.includes('ROAS') ? ctx.raw + '%' : ctx.raw.toLocaleString() + '원'}` } }
                    },
                    scales: { 
                        y: { type: 'linear', position: 'left', grid: { color: '#f8fafc' }, title: { display: true, text: '금액(원)', font: { weight: 'bold' } } },
                        y1: { type: 'linear', position: 'right', grid: { display: false }, title: { display: true, text: 'ROAS (%)', font: { weight: 'bold' } }, ticks: { color: theme.roas, font: { weight: 'bold' } } }
                    }
                }
            });
        }

        function changeTheme(color, el) {
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            activeTheme = color;
            if (myChart) createChart();
        }

        function downloadChart() {
            const link = document.createElement('a');
            link.href = document.getElementById('mkt-chart').toDataURL('image/png');
            link.download = `Report_${activeTheme}.png`;
            link.click();
        }
    </script>
</body>
</html>
