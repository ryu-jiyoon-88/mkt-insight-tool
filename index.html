<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Insight Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📊 마케팅 전략 캠페인 보드</h1>
            <p class="text-gray-500">프로그램 설치 없이 브라우저에서 바로 관리하는 인사이트</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 text-blue-600">🔗 빠른 UTM 생성기</h2>
                <input id="url" type="text" placeholder="기본 URL (https://...)" class="w-full p-2 border rounded mb-2 text-sm">
                <input id="source" type="text" placeholder="Source (naver, meta 등)" class="w-full p-2 border rounded mb-2 text-sm">
                <button onclick="generateUTM()" class="w-full bg-blue-600 text-white py-2 rounded font-medium hover:bg-blue-700">생성하기</button>
                <p id="result" class="mt-4 p-2 bg-gray-100 rounded text-xs break-all text-gray-600 min-h-[40px]"></p>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-semibold mb-4 text-purple-600">📝 경쟁사 소구점 기록</h2>
                <textarea id="memo" class="w-full h-32 p-2 border rounded text-sm mb-2" placeholder="경쟁사 상세페이지 분석 내용이나 아이디어를 적어보세요."></textarea>
                <button onclick="saveMemo()" class="w-full bg-purple-600 text-white py-2 rounded font-medium hover:bg-purple-700">브라우저에 저장</button>
            </div>
        </div>
    </div>

    <script>
        function generateUTM() {
            const url = document.getElementById('url').value;
            const source = document.getElementById('source').value;
            if(!url || !source) return alert('내용을 입력해주세요!');
            const utm = `${url}${url.includes('?') ? '&' : '?'}utm_source=${source}&utm_medium=cpc`;
            document.getElementById('result').innerText = utm;
        }

        function saveMemo() {
            const memo = document.getElementById('memo').value;
            localStorage.setItem('mkt_memo', memo);
            alert('인사이트가 브라우저에 안전하게 저장되었습니다!');
        }

        // 페이지 로드 시 기존 메모 불러오기
        window.onload = () => {
            document.getElementById('memo').value = localStorage.getItem('mkt_memo') || '';
        }
    </script>
</body>
</html>
