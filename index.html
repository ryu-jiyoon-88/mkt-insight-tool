<script>
    function processData() {
        if (rawDataStore.length < 2) return;
        const dict = {
            rev: ['매출', '수입', 'Revenue', 'Sales', '전환금액', '구매금액', '전환매출액'],
            spend: ['광고비', '지출', 'Cost', 'Spend', '비용', '총비용', '금액']
        };

        // 1. 진짜 헤더(요일, 광고비 등)가 있는 행 찾기
        let headerIdx = -1;
        for(let i=0; i<Math.min(rawDataStore.length, 10); i++) {
            const rowStr = JSON.stringify(rawDataStore[i]);
            if (rawDataStore[i] && [...dict.rev, ...dict.spend].some(k => rowStr.includes(k))) {
                headerIdx = i; break;
            }
        }
        if(headerIdx === -1) headerIdx = 1;

        const headerRow = rawDataStore[headerIdx];
        const idx = {
            label: 0, 
            rev: headerRow.findIndex(h => dict.rev.some(k => String(h).includes(k))),
            spend: headerRow.findIndex(h => dict.spend.some(k => String(h).includes(k)))
        };

        let items = [];
        for(let i = headerIdx + 1; i < rawDataStore.length; i++) {
            const row = rawDataStore[i];
            // [중요] 첫 칸이 비었거나, '보고서', '계정', '합계' 같은 단어가 있으면 무시
            if (!row || !row[idx.label] || 
                /보고서|계정|기간|합계|Total/i.test(String(row[idx.label]))) continue;
            
            const parseNum = (v) => parseFloat(String(v).replace(/[^0-9.-]+/g, "")) || 0;

            items.push({ 
                label: String(row[idx.label]), 
                rev: idx.rev !== -1 ? parseNum(row[idx.rev]) : 0, 
                spend: idx.spend !== -1 ? parseNum(row[idx.spend]) : 0 
            });
        }
        
        // ... (이후 그래프 그리는 로직 동일)
    }
</script>
