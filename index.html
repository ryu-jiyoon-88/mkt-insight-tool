<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        :root { --main-brown: #634832; --sub-brown: #8b735b; --point-pink: #ff85a1; --bg-soft: #fcfaf8; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-soft); color: var(--main-brown); }
        .tool-card { @apply p-10 rounded-[2.5rem] bg-white border border-[#eeebe8] shadow-sm transition-all; }
        .calc-input { @apply w-full p-5 rounded-2xl outline-none border-2 font-bold text-lg; background-color: #f8f6f4; border-color: #eeebe8; }
        .tab-btn { @apply px-8 py-4 font-black text-xl transition-all border-b-4 border-transparent; color: #c4b5a6; }
        .tab-btn.active { border-color: var(--point-pink); color: var(--point-pink); }
        .strategy-box { @apply p-6 rounded-3xl bg-stone-50 border border-stone-100 mb-6; }
        .media-label { @apply inline-block px-3 py-1 rounded-lg bg-stone-800 text-white text-[10px] font-bold mb-3; }
        b { color: var(--point-pink); font-weight: 900; }
    </style>
</head>
<body class="pb-20">
    <div class="max-w-6xl mx-auto p-6 md:p-10">
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between border-b border-stone-200 pb-10">
            <div>
                <h1 class="text-5xl font-black tracking-tighter italic uppercase" style="color: var(--main-brown);">Work Less, <span style="color:var(--point-pink)">Earn More</span></h1>
                <p class="mt-3 font-bold text-xl uppercase italic text-stone-400">AI Marketing Workspace</p>
            </div>
            <nav class="flex gap-4">
                <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-btn active">01. DASHBOARD</button>
                <button onclick="switchTab('ai-strategy')" id="tab-ai" class="tab-btn">02. AI STRATEGY</button>
            </nav>
        </header>

        <div id="view-dashboard" class="space-y-8">
            <div class="tool-card">
                <h2 class="text-2xl font-black mb-8 flex items-center gap-2">🔍 실시간 트렌드 체크</h2>
                <div class="flex flex-col md:flex-row gap-4">
                    <input id="search-brand" type="text" placeholder="키워드를 적어주세요!" class="flex-1 p-6 rounded-2xl outline-none font-bold border-2 border-stone-100 text-xl bg-stone-50 focus:border-pink-300">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <button onclick="monitor('blackkiwi')" class="py-4 px-4 rounded-2xl bg-stone-100 font-black hover:bg-pink-100 hover:text-pink-500 transition">🥝 블랙키위</button>
                        <button onclick="monitor('naver')" class="py-4 px-4 rounded-2xl bg-stone-100 font-black hover:bg-pink-100 hover:text-pink-500 transition">💚 네이버</button>
                        <button onclick="monitor('youtube')" class="py-4 px-4 rounded-2xl bg-stone-100 font-black hover:bg-pink-100 hover:text-pink-500 transition">🔴 유튜브</button>
                        <button onclick="monitor('insta')" class="py-4 px-4 rounded-2xl bg-stone-100 font-black hover:bg-pink-100 hover:text-pink-500 transition">📸 인스타</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="tool-card border-2 border-pink-50">
                    <h3 class="text-xl font-bold mb-6 italic">🎯 ROAS 계산기</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="calc-spend-1" type="number" oninput="runCalc()" placeholder="광고비" class="calc-input">
                        <input id="calc-rev-1" type="number" oninput="runCalc()" placeholder="매출액" class="calc-input">
                    </div>
                    <div id="res-roas" class="mt-8 text-center text-7xl font-black font-mono opacity-20">0%</div>
                </div>
                <div class="tool-card">
                    <h2 class="text-xl font-bold mb-6 italic">📁 성과 데이터 업로드 (Excel)</h2>
                    <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="w-full h-40 border-4 border-dashed border-stone-100 rounded-[2rem] flex flex-col items-center justify-center text-stone-300 hover:bg-pink-50 cursor-pointer transition-all">
                        <span class="font-black italic">여기를 눌러 파일을 올려주세요</span>
                        <input type="file" id="file-input" class="hidden" onchange="handleFiles(this.files)">
                    </div>
                </div>
            </div>

            <div class="tool-card">
                <h2 class="text-3xl font-black mb-8">📊 성과 추이 그래프</h2>
                <div id="chart-wrapper" class="hidden h-[500px]"><canvas id="mkt-chart"></canvas></div>
            </div>
        </div>

        <div id="view-ai-strategy" class="hidden space-y-8">
            <div class="tool-card">
                <h2 class="text-3xl font-black mb-10 border-b pb-6 uppercase">Data-Driven <span style="color:var(--point-pink)">Strategy</span></h2>
                <div class="strategy-box">
                    <span class="media-label">파워링크</span>
                    <p class="text-xl font-bold italic">"키워드별 <b>CPA 최적화</b> 및 저효율 키워드 필터링"</p>
                </div>
                <div class="strategy-box">
                    <span class="media-label">쇼핑검색</span>
                    <p class="text-xl font-bold italic">"고효율 상품군 <b>노출 비중 확대</b>"</p>
                </div>
                <div class="strategy-box">
                    <span class="media-label">메타</span>
                    <p class="text-xl font-bold italic">"캠페인 <b>빈도 점검</b> 및 타겟 확장"</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;

        function switchTab(tab) {
            document.getElementById('view-dashboard').classList.toggle('hidden', tab !== 'dashboard');
            document.getElementById('view-ai-strategy').classList.toggle('hidden', tab !== 'ai-strategy');
            document.getElementById('tab-dashboard').classList.toggle('active', tab === 'dashboard');
            document.getElementById('tab-ai').classList.toggle('active', tab === 'ai-strategy');
        }

        // 트렌드 모니터 함수
        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('키워드를 입력해 주세요!');
            let url = "";
            if(type === 'blackkiwi') url = `https://blackkiwi.net/service/keyword-analysis?keyword=${encodeURIComponent(brand)}`;
            if(type === 'naver') url = `https://search.naver.com/search.naver?query=${encodeURIComponent(brand)}`;
            if(type === 'youtube') url = `https://www.youtube.com/results?search_query=${encodeURIComponent(brand)}`;
            if(type === 'insta') url = `https://www.instagram.com/explore/tags/${encodeURIComponent(brand)}`;
            window.open(url, '_blank');
        }

        function runCalc() {
            const s1 = parseFloat(document.getElementById('calc-spend-1').value) || 0;
            const r1 = parseFloat(document.getElementById('calc-rev-1').value) || 0;
            const resRoas = document.getElementById('res-roas');
            if(s1 > 0) {
                resRoas.innerText = Math.round((r1 / s1) * 100) + '%';
                resRoas.style.color = '#ff85a1';
                resRoas.style.opacity = '1';
            }
        }

        function handleFiles(files) {
            if (!files[0]) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                processAndChart(json);
            };
            reader.readAsArrayBuffer(files[0]);
        }

        function processAndChart(rawData) {
            let labels = [], revs = [], spends = [];
            for(let i = 1; i < Math.min(rawData.length, 31); i++) {
                if(rawData[i][0]) {
                    labels.push(rawData[i][0]);
                    revs.push(parseFloat(rawData[i][1]) || 0);
                    spends.push(parseFloat(rawData[i][2]) || 1);
                }
            }
            updateChart(labels, revs, spends);
        }

        function updateChart(labels, revs, spends) {
            document.getElementById('chart-wrapper').classList.remove('hidden');
            const ctx = document.getElementById('mkt-chart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { label: '매출액', type: 'bar', data: revs, backgroundColor: '#ff85a1', borderRadius: 8 },
                        { label: '광고비', type: 'line', data: spends, borderColor: '#634832', borderWidth: 3, fill: false }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
