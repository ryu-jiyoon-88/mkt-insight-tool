<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Performance Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .tool-card { @apply bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100; }
        .calc-input { @apply w-full p-5 bg-slate-50 rounded-2xl outline-none border-2 border-slate-100 font-bold text-lg focus:ring-4 focus:ring-indigo-500 transition-all; }
        
        /* 컬러 버튼: 절대 누락되지 않도록 고정 크기 및 배경색 강제 지정 */
        .tone-button { width: 44px; height: 44px; border-radius: 50%; cursor: pointer; border: 4px solid white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); transition: all 0.2s; flex-shrink: 0; }
        .tone-button:hover { transform: scale(1.1); }
        .tone-button.active { ring: 4px solid #1e293b; transform: scale(1.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-20">
    <div class="max-w-6xl mx-auto p-6 md:p-10">
        
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6 border-b pb-10">
            <div>
                <h1 class="text-5xl font-black text-slate-800 tracking-tighter italic">WORK LESS, PLAY MORE!</h1>
                <p class="text-indigo-600 mt-3 font-bold text-xl text-slate-400">효율 중심의 '적게 일하고 많이 벌기' 프로젝트</p>
            </div>
        </header>

        <div class="space-y-8">
            <div class="tool-card">
                <h2 class="text-2xl font-black text-slate-800 mb-8 flex items-center gap-2">🔍 실시간 트렌드 체크</h2>
                <div class="flex flex-col md:flex-row gap-4">
                    <input id="search-brand" type="text" placeholder="분석할 키워드를 입력하세요" class="flex-1 p-6 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold border border-slate-100 text-xl">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        <button onclick="monitor('blackkiwi')" class="px-6 py-4 rounded-2xl bg-orange-50 text-orange-600 font-black hover:bg-orange-100 transition shadow-sm border border-orange-100">🥝 블랙키위</button>
                        <button onclick="monitor('blog')" class="px-6 py-4 rounded-2xl bg-green-50 text-green-700 font-bold hover:bg-green-100 transition shadow-sm border border-green-100">🟢 블로그</button>
                        <button onclick="monitor('cafe')" class="px-6 py-4 rounded-2xl bg-emerald-50 text-emerald-700 font-bold hover:bg-emerald-100 transition shadow-sm border border-emerald-100">☕ 카페</button>
                        <button onclick="monitor('insta')" class="px-6 py-4 rounded-2xl bg-pink-50 text-pink-600 font-bold hover:bg-pink-100 transition shadow-sm border border-pink-100">📸 인스타</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="tool-card border-2 border-indigo-50">
                    <h3 class="text-xl font-bold text-indigo-700 mb-6 italic">🎯 ROAS 계산기</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="calc-spend-1" type="number" oninput="runCalc()" placeholder="광고비" class="calc-input">
                        <input id="calc-rev-1" type="number" oninput="runCalc()" placeholder="매출액" class="calc-input">
                    </div>
                    <div id="res-roas" class="mt-8 text-center text-7xl font-black text-slate-200 font-mono">0%</div>
                </div>
                <div class="tool-card border-2 border-emerald-50">
                    <h3 class="text-xl font-bold text-emerald-700 mb-6 italic">🎯 목표 매출 계산기</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="calc-spend-2" type="number" oninput="runCalc()" placeholder="광고비" class="calc-input">
                        <input id="calc-target-roas" type="number" oninput="runCalc()" placeholder="목표 ROAS(%)" class="calc-input">
                    </div>
                    <div id="res-target-rev" class="mt-8 text-right text-4xl font-black text-emerald-600 font-mono">0원</div>
                </div>
            </div>

            <div class="tool-card border-2 border-slate-100">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                    <div>
                        <h2 class="text-3xl font-black text-slate-800">📊 성과 시각화 리포트</h2>
                        <p class="text-slate-400 font-medium mt-1 italic">데이터를 드롭하여 실시간 성과를 확인하세요.</p>
                    </div>
                    
                    <div class="flex items-center gap-6 bg-slate-50 p-4 px-6 rounded-3xl border border-slate-200 shadow-inner">
                        <div class="flex items-center gap-4">
                            <span class="text-xs font-black text-slate-400 uppercase">Tone Select</span>
                            <div class="flex items-center gap-3">
                                <div onclick="setChartColor('#4f46e5')" class="tone-button active" style="background-color: #4f46e5;" id="sel-indigo"></div>
                                <div onclick="setChartColor('#e11d48')" class="tone-button" style="background-color: #e11d48;" id="sel-rose"></div>
                                <div onclick="setChartColor('#10b981')" class="tone-button" style="background-color: #10b981;" id="sel-emerald"></div>
                                <div onclick="setChartColor('#f59e0b')" class="tone-button" style="background-color: #f59e0b;" id="sel-amber"></div>
                            </div>
                        </div>
                        <div class="w-px h-8 bg-slate-200"></div>
                        <button onclick="downloadChart()" class="bg-slate-800 text-white px-6 py-3 rounded-xl text-sm font-black hover:bg-black transition-all">PNG 저장</button>
                    </div>
                </div>

                <div id="drop-zone" class="w-full h-80 border-4 border-dashed border-slate-100 rounded-[3rem] flex flex-col items-center justify-center text-slate-300 hover:border-indigo-200 hover:bg-indigo-50/50 transition-all cursor-pointer">
                    <div class="text-center">
                        <div class="text-6xl mb-4">📂</div>
                        <span class="text-xl font-black text-slate-500">엑셀 파일을 드롭하세요</span>
                    </div>
                    <input type="file" id="file-input" multiple class="hidden">
                </div>

                <div id="chart-container" class="h-[600px] hidden">
                    <canvas id="mkt-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeColor = '#4f46e5';
        let rawDataStore = [];
        let myChart = null;

        function setChartColor(hex) {
            activeColor = hex;
            document.querySelectorAll('.tone-button').forEach(el => el.classList.remove('active'));
            const map = {'#4f46e5':'sel-indigo', '#e11d48':'sel-rose', '#10b981':'sel-emerald', '#f59e0b':'sel-amber'};
            document.getElementById(map[hex]).classList.add('active');
            if(rawDataStore.length > 0) processData();
            runCalc();
        }

        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        resolve(XLSX.utils.sheet_to_json(sheet, { header: 1 }));
                    };
                    reader.readAsArrayBuffer(file);
                });
            });
            Promise.all(promises).then(allData => {
                rawDataStore = allData.flat();
                processData();
            });
        }

        function processData() {
            if (rawDataStore.length === 0) return;
            const dict = {
                rev: ['매출', '수입', 'Revenue', 'Sales', '전환금액', '구매금액'],
                spend: ['광고비', '지출', 'Cost', 'Spend', '비용', '총비용']
            };

            let headerIdx = -1;
            for(let i=0; i<Math.min(rawDataStore.length, 15); i++) {
                if (rawDataStore[i].some(cell => [...dict.rev, ...dict.spend].some(k => String(cell).includes(k)))) {
                    headerIdx = i; break;
                }
            }
            if(headerIdx === -1) return alert("매출 혹은 광고비 항목을 찾을 수 없습니다.");

            const headerRow = rawDataStore[headerIdx];
            const idx = {
                label: 0,
                rev: headerRow.findIndex(h => dict.rev.some(k => String(h).includes(k))),
                spend: headerRow.findIndex(h => dict.spend.some(k => String(h).includes(k)))
            };

            const labels = [], revs = [], spends = [], roasArr = [];

            rawDataStore.forEach((row, i) => {
                if (i <= headerIdx || !row[idx.label] || String(row[idx.label]).includes('합계')) return;
                const parseNum = (v) => parseFloat(String(v).replace(/[^0-9.-]+/g, "")) || 0;
                const r = parseNum(row[idx.rev]);
                const s = parseNum(row[idx.spend]);
                const roas = s > 0 ? Math.round((r/s)*100) : 0;
                if (r === 0 && s === 0) return;

                labels.push(row[idx.label]);
                revs.push(r);
                spends.push(s);
                roasArr.push(roas);
            });

            updateChart(labels, revs, spends, roasArr);
        }

        function updateChart(labels, revs, spends, roas) {
            const ctx = document.getElementById('mkt-chart').getContext('2d');
            document.getElementById('chart-container').classList.remove('hidden');
            document.getElementById('drop-zone').classList.add('hidden');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'ROAS (%)', type: 'line', data: roas, borderColor: activeColor, backgroundColor: activeColor, borderWidth: 6, pointRadius: 7, pointBackgroundColor: '#fff', yAxisID: 'y1', order: 1 },
                        { label: 'Spend', type: 'line', data: spends, borderColor: 'rgba(148, 163, 184, 0.4)', borderDash: [6, 4], borderWidth: 3, pointRadius: 0, yAxisID: 'y', order: 2 },
                        { label: 'Revenue', type: 'bar', data: revs, backgroundColor: activeColor + '1A', borderRadius: 15, yAxisID: 'y', order: 3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, position: 'left', ticks: { callback: v => v.toLocaleString() + '원' } },
                        y1: { beginAtZero: true, position: 'right', grid: { drawOnChartArea: false }, ticks: { color: activeColor, font: { weight: 'bold' }, callback: v => v + '%' } }
                    },
                    plugins: { legend: { position: 'top', labels: { usePointStyle: true, padding: 25, font: { size: 14, weight: 'bold' } } } }
                }
            });
        }

        function runCalc() {
            const s1 = parseFloat(document.getElementById('calc-spend-1').value) || 0;
            const r1 = parseFloat(document.getElementById('calc-rev-1').value) || 0;
            const resRoas = document.getElementById('res-roas');
            if(s1 > 0) {
                const val = (r1 / s1) * 100;
                resRoas.innerText = Math.round(val) + '%';
                resRoas.style.color = activeColor;
            }
            const s2 = parseFloat(document.getElementById('calc-spend-2').value) || 0;
            const tr = parseFloat(document.getElementById('calc-target-roas').value) || 0;
            const resTarget = document.getElementById('res-target-rev');
            if(s2 > 0 && tr > 0) resTarget.innerText = Math.round(s2 * (tr/100)).toLocaleString() + '원';
        }

        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('키워드를 입력해 주세요!');
            let url = "";
            switch(type) {
                case 'blackkiwi': url = `https://blackkiwi.net/service/keyword-analysis?keyword=${encodeURIComponent(brand)}`; break;
                case 'blog': url = `https://search.naver.com/search.naver?where=blog&query=${encodeURIComponent(brand)}`; break;
                case 'cafe': url = `https://search.naver.com/search.naver?where=article&query=${encodeURIComponent(brand)}`; break;
                case 'insta': url = `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`; break;
            }
            window.open(url, '_blank');
        }

        function downloadChart() {
            const link = document.createElement('a');
            link.href = document.getElementById('mkt-chart').toDataURL('image/png');
            link.download = `Report.png`;
            link.click();
        }
    </script>
</body>
</html>
