<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Marketing Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-900">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">🚀 AE Marketing Command Center</h1>
                <p class="text-slate-500 mt-1">지윤 AE의 업무 효율 극대화 보드</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-slate-400">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-emerald-600 mb-4 flex items-center gap-2">📊 ROAS 계산기</h2>
                <div class="space-y-3">
                    <input id="spend" type="number" oninput="calcROAS()" placeholder="광고비 (원)" class="w-full p-3 bg-slate-50 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                    <input id="revenue" type="number" oninput="calcROAS()" placeholder="매출액 (원)" class="w-full p-3 bg-slate-50 rounded-lg outline-none focus:ring-2 focus:ring-emerald-500 text-sm">
                    <div class="p-4 bg-emerald-50 rounded-xl text-center">
                        <span class="block text-xs text-emerald-600 mb-1 font-bold uppercase">실제 ROAS</span>
                        <span id="roas-result" class="text-3xl font-black text-emerald-700">0%</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-orange-600 mb-4 flex items-center gap-2">💰 목표 매출 계산기</h2>
                <div class="space-y-3">
                    <input id="target-spend" type="number" oninput="calcTargetRevenue()" placeholder="예상 광고비 (원)" class="w-full p-3 bg-slate-50 rounded-lg outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                    <input id="target-roas" type="number" oninput="calcTargetRevenue()" placeholder="목표 ROAS (%)" class="w-full p-3 bg-slate-50 rounded-lg outline-none focus:ring-2 focus:ring-orange-500 text-sm">
                    <div class="p-4 bg-orange-50 rounded-xl text-center border border-orange-100">
                        <span class="block text-xs text-orange-600 mb-1 font-bold uppercase">필요 매출액</span>
                        <span id="target-revenue-result" class="text-3xl font-black text-orange-700">0원</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                <h2 class="text-lg font-bold text-blue-600 mb-4 flex items-center gap-2 text-sm">🔗 UTM 생성기</h2>
                <input id="url" type="text" placeholder="기본 URL" class="w-full p-3 bg-slate-50 rounded-lg mb-2 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <input id="source" type="text" placeholder="Source (naver, meta...)" class="w-full p-3 bg-slate-50 rounded-lg mb-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="generateUTM()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">링크 복사</button>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-indigo-600 mb-4 flex items-center gap-2">🔍 경쟁사 상세페이지 분석</h2>
                <div class="grid grid-cols-1 gap-4">
                    <input id="comp-name" type="text" placeholder="브랜드/제품명" class="p-3 bg-slate-50 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                    <textarea id="comp-text" class="h-40 p-4 bg-slate-50 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="상세페이지 텍스트를 복사해서 넣어주세요."></textarea>
                    <button onclick="analyzePage()" class="bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">전략 도출</button>
                </div>

                <div id="analysis-result" class="mt-6 p-5 bg-indigo-50 rounded-xl hidden">
                    <h3 id="result-title" class="font-bold text-indigo-800 mb-2 border-b border-indigo-200 pb-2"></h3>
                    <div id="result-content" class="text-sm text-indigo-900 leading-relaxed whitespace-pre-wrap"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 시계 기능
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }, 1000);

        // ROAS 계산
        function calcROAS() {
            const spend = parseFloat(document.getElementById('spend').value) || 0;
            const revenue = parseFloat(document.getElementById('revenue').value) || 0;
            const res = document.getElementById('roas-result');
            if(spend > 0) {
                const roas = (revenue/spend)*100;
                res.innerText = roas.toLocaleString(undefined, {maximumFractionDigits:1}) + '%';
                res.className = roas >= 300 ? "text-3xl font-black text-emerald-600" : "text-3xl font-black text-rose-500";
            } else { res.innerText = '0%'; res.className = "text-3xl font-black text-slate-300"; }
        }

        // [추가] 목표 매출액 계산
        function calcTargetRevenue() {
            const spend = parseFloat(document.getElementById('target-spend').value) || 0;
            const roas = parseFloat(document.getElementById('target-roas').value) || 0;
            const res = document.getElementById('target-revenue-result');
            
            if(spend > 0 && roas > 0) {
                const revenue = spend * (roas / 100);
                res.innerText = Math.round(revenue).toLocaleString() + '원';
                res.className = "text-3xl font-black text-orange-700";
            } else {
                res.innerText = '0원';
                res.className = "text-3xl font-black text-slate-300";
            }
        }

        function generateUTM() {
            const url = document.getElementById('url').value;
            const source = document.getElementById('source').value;
            if(!url || !source) return alert('정보를 입력해주세요.');
            const utm = `${url}${url.includes('?') ? '&' : '?'}utm_source=${source}&utm_medium=cpc`;
            navigator.clipboard.writeText(utm).then(() => alert('UTM 복사 완료!'));
        }

        function analyzePage() {
            const name = document.getElementById('comp-name').value;
            const text = document.getElementById('comp-text').value;
            if(!name || !text) return alert('정보를 입력해주세요.');

            const resultBox = document.getElementById('analysis-result');
            const resultContent = document.getElementById('result-content');
            
            const analysis = `[상세페이지 구조 분석]\n` +
                             `1. 후킹(Intro): 상단 카피 중심의 강점 강조\n` +
                             `2. 핵심 USP: 상세페이지 중반부 기능성 소구점 배치\n` +
                             `3. 신뢰 포인트: 리뷰 및 인증 데이터 활용\n` +
                             `4. 클로징: 구매 혜택 및 이벤트 강조\n\n` +
                             `* 전략 제언: 해당 브랜드의 텍스트 기반으로 볼 때, 지윤 AE님이 준비하시는 캠페인에서는 이미지 중심의 카드뉴스로 차별화하면 효율이 더 좋을 것으로 보입니다.`;

            document.getElementById('result-title').innerText = `📌 ${name} 분석 결과`;
            resultContent.innerText = analysis;
            resultBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
