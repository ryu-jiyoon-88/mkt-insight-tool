<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Life Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; letter-spacing: -0.02em; }
        .tool-card { @apply bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 transition-all hover:shadow-md; }
        .tab-btn { @apply px-8 py-4 font-bold text-slate-400 border-b-4 border-transparent transition-all; }
        .tab-btn.active { @apply text-indigo-600 border-indigo-600; }
        .calc-input { @apply w-full p-4 bg-slate-50 rounded-2xl outline-none border border-slate-100 font-bold text-sm focus:ring-2 focus:ring-indigo-500; }
        .color-selector { @apply w-6 h-6 rounded-full cursor-pointer border-2 border-white shadow-sm hover:scale-110 transition-transform; }
        .color-selector.active { @apply ring-2 ring-slate-800; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-7xl mx-auto p-6 md:p-10">
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-8">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tight italic">✨ 적게 일하고 많이 벌자!</h1>
                <p class="text-slate-500 mt-2 font-bold text-lg text-indigo-600">효율 중심의 마케팅 업무 자동화 프로젝트</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-slate-300">00:00:00</div>
        </header>

        <div class="flex gap-4 mb-8 border-b">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-btn active">📈 통합 대시보드</button>
            <button onclick="switchTab('manager')" id="tab-manager" class="tab-btn">📁 데이터 매니저</button>
        </div>

        <div id="content-dashboard" class="space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="tool-card border-2 border-indigo-50">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 italic text-center">🎯 ROAS 계산기</h2>
                    <div class="p-5 bg-slate-50 rounded-[2rem] border border-slate-100">
                        <div class="grid grid-cols-2 gap-4 mt-2">
                            <input id="calc-spend-1" type="number" oninput="runCalc()" placeholder="광고비" class="calc-input">
                            <input id="calc-rev-1" type="number" oninput="runCalc()" placeholder="매출액" class="calc-input">
                        </div>
                        <div id="res-roas" class="mt-6 text-center text-4xl font-black text-slate-300 font-mono">0%</div>
                    </div>
                </div>
                <div class="tool-card border-2 border-emerald-50">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 italic text-center">🎯 목표 매출 계산기</h2>
                    <div class="p-5 bg-emerald-50/30 rounded-[2rem] border border-emerald-100">
                        <div class="grid grid-cols-2 gap-4 mt-2">
                            <input id="calc-spend-2" type="number" oninput="runCalc()" placeholder="광고비" class="calc-input">
                            <input id="calc-target-roas" type="number" oninput="runCalc()" placeholder="목표 ROAS(%)" class="calc-input">
                        </div>
                        <div id="res-target-rev" class="mt-6 text-right text-2xl font-black text-emerald-600 font-mono">0원</div>
                    </div>
                </div>
            </div>

            <div class="tool-card">
                <h2 class="text-xl font-bold text-slate-800 mb-6">🔍 실시간 트렌드 체크</h2>
                <div class="flex flex-col md:flex-row gap-4">
                    <input id="search-brand" type="text" placeholder="분석할 키워드를 입력하세요" class="flex-1 p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold border border-slate-100 text-lg">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        <button onclick="monitor('blog')" class="px-6 py-4 rounded-2xl bg-slate-50 hover:bg-green-50 text-slate-600 font-bold transition">🟢 블로그</button>
                        <button onclick="monitor('cafe')" class="px-6 py-4 rounded-2xl bg-slate-50 hover:bg-emerald-50 text-slate-600 font-bold transition">☕ 카페</button>
                        <button onclick="monitor('blackkiwi')" class="px-6 py-4 rounded-2xl bg-slate-50 hover:bg-orange-50 text-slate-600 hover:text-orange-600 font-bold transition">🥝 블랙키위</button>
                        <button onclick="monitor('insta')" class="px-6 py-4 rounded-2xl bg-slate-50 hover:bg-pink-50 text-slate-600 font-bold transition">📸 인스타</button>
                    </div>
                </div>
            </div>

            <div class="tool-card">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                    <h2 class="text-2xl font-black text-slate-800">📊 성과 데이터 그래프</h2>
                    <div class="flex items-center gap-4 bg-slate-50 px-5 py-3 rounded-2xl border border-slate-100">
                        <div class="flex gap-2">
                            <div onclick="setChartColor('#4f46e5')" class="color-selector bg-indigo-500 active" id="sel-indigo"></div>
                            <div onclick="setChartColor('#e11d48')" class="color-selector bg-rose-500" id="sel-rose"></div>
                            <div onclick="setChartColor('#10b981')" class="color-selector bg-emerald-500" id="sel-emerald"></div>
                        </div>
                        <button onclick="downloadChart()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-black transition-all">PNG 저장</button>
                    </div>
                </div>
                <div id="drop-zone" class="w-full h-56 border-2 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center text-slate-400 hover:border-indigo-300 hover:bg-indigo-50 transition cursor-pointer">
                    <span class="text-xl font-bold text-slate-600">파일을 드래그하거나 클릭하여 업로드</span>
                    <p class="text-sm mt-2">매출액, 광고비(비용), 날짜 항목이 포함된 파일이면 OK!</p>
                    <input type="file" id="file-input" multiple class="hidden">
                </div>
                <div id="chart-container" class="h-[550px] hidden">
                    <canvas id="mkt-chart"></canvas>
                </div>
            </div>
        </div>

        <div id="content-manager" class="hidden space-y-6">
            <div class="tool-card">
                <h2 class="text-2xl font-black text-slate-800 mb-6">📁 원가 기반 데이터 분석</h2>
                <div class="overflow-x-auto rounded-[2rem] border border-slate-100">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-500 font-bold border-b">
                            <tr>
                                <th class="p-5">항목</th><th class="p-5">매출액</th><th class="p-5">광고비</th><th class="p-5">ROAS</th><th class="p-5 text-emerald-600">마진액</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body" class="divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let activeColor = '#4f46e5';
        let rawDataStore = [];
        let myChart = null;

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function switchTab(tab) {
            document.getElementById('content-dashboard').classList.toggle('hidden', tab !== 'dashboard');
            document.getElementById('content-manager').classList.toggle('hidden', tab !== 'manager');
            document.getElementById('tab-dashboard').classList.toggle('active', tab === 'dashboard');
            document.getElementById('tab-manager').classList.toggle('active', tab === 'manager');
        }

        function setChartColor(hex) {
            activeColor = hex;
            document.querySelectorAll('.color-selector').forEach(el => el.classList.remove('active'));
            if(hex === '#4f46e5') document.getElementById('sel-indigo').classList.add('active');
            if(hex === '#e11d48') document.getElementById('sel-rose').classList.add('active');
            if(hex === '#10b981') document.getElementById('sel-emerald').classList.add('active');
            if(rawDataStore.length > 0) processData();
        }

        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        resolve(XLSX.utils.sheet_to_json(sheet, { header: 1 }));
                    };
                    reader.readAsArrayBuffer(file);
                });
            });
            Promise.all(promises).then(allData => {
                rawDataStore = allData.flat();
                processData();
            });
        }

        function processData() {
            if (rawDataStore.length === 0) return;
            const body = document.getElementById('data-table-body');
            body.innerHTML = '';

            // [강화된 탐지] 헤더 찾기 (대소문자 무관, 포함 검색)
            const headerRow = rawDataStore.find(row => row.some(cell => 
                /(시간|날짜|매장|제품|총비용|광고비|매출|전환금액|구매금액)/i.test(String(cell))
            ));
            
            if(!headerRow) {
                alert("파일에서 '매출'이나 '비용' 항목을 찾을 수 없습니다. 헤더 이름을 확인해주세요!");
                return;
            }

            const idx = {
                label: headerRow.findIndex(h => /(시간|날짜|매장|제품)/i.test(String(h))),
                rev: headerRow.findIndex(h => /(매출|전환금액|구매금액|구매완료)/i.test(String(h))),
                spend: headerRow.findIndex(h => /(총비용|광고비|지출|비용)/i.test(String(h)))
            };

            const labels = [], chartRev = [], chartSpend = [], chartRoas = [];

            rawDataStore.forEach((row) => {
                if (row === headerRow || !row[idx.label] || String(row[idx.label]).includes('합계')) return;
                
                // 숫자 변환 (콤마, 원화 표시 제거)
                const parseNum = (val) => parseFloat(String(val).replace(/[^0-9.-]+/g, "")) || 0;
                
                const r = parseNum(row[idx.rev]);
                const s = parseNum(row[idx.spend]);
                const roas = s > 0 ? Math.round((r/s)*100) : 0;

                if (r === 0 && s === 0) return;

                labels.push(row[idx.label]);
                chartRev.push(r);
                chartSpend.push(s);
                chartRoas.push(roas);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `<td class="p-5 font-bold">${row[idx.label]}</td><td class="p-5 font-mono">${r.toLocaleString()}원</td><td class="p-5 font-mono text-slate-400">${s.toLocaleString()}원</td><td class="p-5 font-black">${roas}%</td><td class="p-5 text-emerald-600 font-bold">${(r-s).toLocaleString()}원</td>`;
                body.appendChild(tr);
            });

            if(labels.length > 0) updateChart(labels, chartRev, chartSpend, chartRoas);
        }

        function updateChart(labels, revs, spends, roas) {
            const ctx = document.getElementById('mkt-chart').getContext('2d');
            document.getElementById('chart-container').classList.remove('hidden');
            document.getElementById('drop-zone').classList.add('hidden');
            
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '로아스 (ROAS %)',
                            type: 'line',
                            data: roas,
                            borderColor: activeColor, // 진한 선
                            backgroundColor: activeColor,
                            borderWidth: 4,
                            pointRadius: 5,
                            pointBackgroundColor: '#fff',
                            yAxisID: 'y1',
                            zIndex: 10
                        },
                        {
                            label: '총비용 (Spend)',
                            type: 'line',
                            data: spends,
                            borderColor: 'rgba(148, 163, 184, 0.4)', // 연한 점선
                            borderDash: [6, 4],
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            yAxisID: 'y',
                            zIndex: 5
                        },
                        {
                            label: '매출액 (Revenue)',
                            type: 'bar',
                            data: revs,
                            backgroundColor: 'rgba(79, 70, 229, 0.1)', // 연한 막대
                            borderRadius: 10,
                            yAxisID: 'y',
                            zIndex: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            position: 'left',
                            title: { display: true, text: '금액 (원)', font: { weight: 'bold' } }
                        },
                        y1: { 
                            beginAtZero: true, 
                            position: 'right',
                            grid: { drawOnChartArea: false },
                            title: { display: true, text: 'ROAS (%)', font: { weight: 'bold' } },
                            ticks: { color: activeColor, font: { weight: 'bold' } }
                        }
                    }
                }
            });
        }

        function runCalc() {
            const s1 = parseFloat(document.getElementById('calc-spend-1').value) || 0;
            const r1 = parseFloat(document.getElementById('calc-rev-1').value) || 0;
            const resRoas = document.getElementById('res-roas');
            if(s1 > 0) {
                const val = (r1 / s1) * 100;
                resRoas.innerText = Math.round(val) + '%';
                resRoas.style.color = val >= 300 ? '#10b981' : '#ef4444';
            }
            const s2 = parseFloat(document.getElementById('calc-spend-2').value) || 0;
            const tr = parseFloat(document.getElementById('calc-target-roas').value) || 0;
            const resTarget = document.getElementById('res-target-rev');
            if(s2 > 0 && tr > 0) resTarget.innerText = Math.round(s2 * (tr/100)).toLocaleString() + '원';
        }

        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('키워드를 입력해 주세요!');
            let url = "";
            switch(type) {
                case 'blog': url = `https://search.naver.com/search.naver?where=blog&query=${encodeURIComponent(brand)}`; break;
                case 'cafe': url = `https://search.naver.com/search.naver?where=article&query=${encodeURIComponent(brand)}`; break;
                case 'blackkiwi': url = `https://blackkiwi.net/service/keyword-analysis?keyword=${encodeURIComponent(brand)}`; break;
                case 'insta': url = `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`; break;
            }
            window.open(url, '_blank');
        }

        function downloadChart() {
            const link = document.createElement('a');
            link.href = document.getElementById('mkt-chart').toDataURL('image/png');
            link.download = `성과보고서_${new Date().toLocaleDateString()}.png`;
            link.click();
        }
    </script>
</body>
</html>
