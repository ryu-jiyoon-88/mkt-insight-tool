<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Marketing Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-900">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">🚀 AE Command Center</h1>
                <p class="text-slate-500 mt-1 font-medium">지윤 AE의 업무 효율 극대화 보드</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-slate-400 text-right">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-indigo-600 mb-4 flex items-center gap-2">🔍 한 달 데이터 퀵 모니터링 (최신순)</h2>
                <input id="search-brand" type="text" placeholder="분석할 업체명 입력" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold mb-4">
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="monitor('blog')" class="py-3 px-4 rounded-xl bg-green-50 text-green-700 border border-green-200 font-bold hover:bg-green-100 transition text-sm">
                        🟢 블로그 (최근1달/최신순)
                    </button>
                    <button onclick="monitor('cafe')" class="py-3 px-4 rounded-xl bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold hover:bg-emerald-100 transition text-sm">
                        ☕ 카페 (최근1달/최신순)
                    </button>
                    <button onclick="monitor('datalab')" class="py-3 px-4 rounded-xl bg-blue-50 text-blue-700 border border-blue-200 font-bold hover:bg-blue-100 transition text-sm">
                        📉 검색 트렌드 (데이터랩)
                    </button>
                    <button onclick="monitor('insta')" class="py-3 px-4 rounded-xl bg-pink-50 text-pink-700 border border-pink-200 font-bold hover:bg-pink-100 transition text-sm">
                        📸 인스타그램 태그
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center justify-between">
                    📊 위클리 수치 기록
                    <button onclick="saveStats()" class="text-xs bg-slate-800 text-white px-3 py-1 rounded-full">저장</button>
                </h2>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center">
                        <label class="text-[10px] text-slate-400 font-bold uppercase">블로그 글</label>
                        <input id="stat-blog" type="text" placeholder="000" class="w-full mt-1 p-2 bg-slate-50 rounded text-center font-bold outline-none border-b-2 border-green-500">
                    </div>
                    <div class="text-center">
                        <label class="text-[10px] text-slate-400 font-bold uppercase">카페 언급</label>
                        <input id="stat-cafe" type="text" placeholder="000" class="w-full mt-1 p-2 bg-slate-50 rounded text-center font-bold outline-none border-b-2 border-emerald-500">
                    </div>
                    <div class="text-center">
                        <label class="text-[10px] text-slate-400 font-bold uppercase">인스타 태그</label>
                        <input id="stat-insta" type="text" placeholder="000" class="w-full mt-1 p-2 bg-slate-50 rounded text-center font-bold outline-none border-b-2 border-pink-500">
                    </div>
                </div>
                <p class="text-[10px] text-slate-400 mt-4 italic text-center text-rose-400">* 직접 눈으로 확인한 수치를 적어두면 브라우저에 남습니다.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-md font-bold text-orange-600 mb-4">💰 목표 매출 계산</h2>
                <input id="t-spend" type="number" oninput="calcT()" placeholder="예상 광고비" class="w-full p-2 bg-slate-50 rounded mb-2 text-sm outline-none border border-slate-100">
                <input id="t-roas" type="number" oninput="calcT()" placeholder="목표 ROAS %" class="w-full p-2 bg-slate-50 rounded mb-4 text-sm outline-none border border-slate-100">
                <div class="p-4 bg-orange-50 rounded-xl">
                    <div id="t-res" class="text-2xl font-black text-orange-700 text-center font-mono text-sm">0원</div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 md:col-span-2">
                <h2 class="text-md font-bold text-indigo-600 mb-4">📝 전략 메모 및 분석 요약</h2>
                <textarea id="memo" class="w-full h-32 p-4 bg-slate-50 rounded-xl outline-none text-sm leading-relaxed border border-slate-100 focus:ring-2 focus:ring-indigo-400" placeholder="한 달간의 트렌드 변화나 특이사항을 기록하세요..."></textarea>
            </div>
        </div>
    </div>

    <script>
        // 시계 기능
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // 모니터링 함수 (최신순 필터 강화)
        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('업체명을 입력해주세요!');
            
            let url = "";
            // nso=so:dd (최신순 정렬) / p:1m (최근 1개월)
            if(type === 'blog') {
                url = `https://search.naver.com/search.naver?where=blog&query=${brand}&sm=tab_opt&nso=so%3Add%2Cp%3A1m`;
            }
            if(type === 'cafe') {
                url = `https://search.naver.com/search.naver?where=article&query=${brand}&sm=tab_opt&nso=so%3Add%2Cp%3A1m`;
            }
            if(type === 'datalab') {
                url = `https://datalab.naver.com/keyword/trendSearch.naver?keywordGroups[0].groupName=${brand}&keywordGroups[0].keywords[0]=${brand}`;
            }
            if(type === 'insta') {
                url = `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`;
            }
            
            window.open(url, '_blank');
        }

        // 목표 매출 계산기
        function calcT() {
            const s = parseFloat(document.getElementById('t-spend').value) || 0;
            const r = parseFloat(document.getElementById('t-roas').value) || 0;
            document.getElementById('t-res').innerText = s > 0 && r > 0 ? Math.round(s * (r/100)).toLocaleString() + '원' : '0원';
        }

        // 로컬 저장 기능
        function saveStats() {
            const stats = {
                blog: document.getElementById('stat-blog').value,
                cafe: document.getElementById('stat-cafe').value,
                insta: document.getElementById('stat-insta').value,
                memo: document.getElementById('memo').value
            };
            localStorage.setItem('ae_stats', JSON.stringify(stats));
            alert('기록이 저장되었습니다!');
        }

        // 페이지 로드 시 저장된 데이터 불러오기
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('ae_stats') || '{}');
            document.getElementById('stat-blog').value = saved.blog || '';
            document.getElementById('stat-cafe').value = saved.cafe || '';
            document.getElementById('stat-insta').value = saved.insta || '';
            document.getElementById('memo').value = saved.memo || '';
        }
    </script>
</body>
</html>
