<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Marketing Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tool-card { @apply bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 transition-all hover:shadow-md; }
        .color-dot { @apply w-6 h-6 rounded-full cursor-pointer border-2 border-white shadow-sm hover:scale-110 transition-transform; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 font-sans text-slate-900">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-8">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tight">🚀 AE Command Center</h1>
                <p class="text-slate-500 mt-2 font-medium">지윤 AE의 데이터 시각화 보드</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-slate-300">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
            <div class="tool-card lg:col-span-2">
                <h2 class="text-xl font-bold text-indigo-600 mb-6 flex items-center gap-2">🔍 실시간 트렌드 체크</h2>
                <input id="search-brand" type="text" placeholder="분석할 업체명을 입력하세요" class="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold mb-6 border border-slate-100 text-lg">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button onclick="monitor('blog')" class="py-4 px-2 rounded-2xl bg-green-50 text-green-700 border border-green-100 font-bold hover:bg-green-100 transition text-sm">🟢 블로그 최신순</button>
                    <button onclick="monitor('cafe')" class="py-4 px-2 rounded-2xl bg-emerald-50 text-emerald-700 border border-emerald-100 font-bold hover:bg-emerald-100 transition text-sm">☕ 카페 최신순</button>
                    <button onclick="monitor('datalab')" class="py-4 px-2 rounded-2xl bg-blue-50 text-blue-700 border border-blue-100 font-bold hover:bg-blue-100 transition text-sm">📉 데이터랩</button>
                    <button onclick="monitor('insta')" class="py-4 px-2 rounded-2xl bg-pink-50 text-pink-700 border border-pink-100 font-bold hover:bg-pink-100 transition text-sm">📸 인스타 태그</button>
                </div>
            </div>

            <div class="tool-card">
                <h2 class="text-xl font-bold text-slate-800 mb-6 italic italic">💰 실시간 퀵 계산기</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-2">
                        <input id="roas-spend" type="number" oninput="calcAll()" placeholder="광고비" class="p-3 bg-slate-50 rounded-xl outline-none text-sm border border-slate-100">
                        <input id="roas-revenue" type="number" oninput="calcAll()" placeholder="매출액" class="p-3 bg-slate-50 rounded-xl outline-none text-sm border border-slate-100">
                    </div>
                    <div id="roas-box" class="p-4 bg-slate-50 rounded-2xl text-center border border-slate-100">
                        <span class="block text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Current ROAS</span>
                        <span id="roas-res" class="text-3xl font-black text-slate-300 font-mono">0%</span>
                    </div>
                    <div class="pt-2 border-t border-dashed">
                        <label class="text-xs font-bold text-orange-500 mb-2 block">목표 ROAS 설정 시 필요 매출액</label>
                        <input id="t-roas" type="number" oninput="calcAll()" placeholder="목표 ROAS (%)" class="w-full p-3 bg-slate-50 rounded-xl outline-none text-sm border border-slate-100">
                        <div id="target-res" class="mt-2 text-right font-black text-orange-600 font-mono">0원</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tool-card relative">
            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <div>
                    <h2 class="text-2xl font-black text-slate-800">📊 Performance Graph</h2>
                    <p class="text-slate-400 text-sm mt-1">엑셀을 넣고 보고서 톤앤매너에 맞는 색상을 선택하세요.</p>
                </div>
                
                <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-2xl border border-slate-100">
                    <span class="text-xs font-bold text-slate-400 mr-2 uppercase tracking-tighter">Color Theme</span>
                    <div onclick="changeTheme('indigo')" class="color-dot bg-indigo-500" title="Indigo Night"></div>
                    <div onclick="changeTheme('rose')" class="color-dot bg-rose-500" title="Rose Modern"></div>
                    <div onclick="changeTheme('emerald')" class="color-dot bg-emerald-500" title="Eco Green"></div>
                    <div onclick="changeTheme('amber')" class="color-dot bg-amber-500" title="Warm Amber"></div>
                    <button onclick="downloadChart()" class="ml-4 text-xs bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-black transition">PNG 저장</button>
                </div>
            </div>
            
            <div id="drop-zone" class="w-full h-60 border-2 border-dashed border-slate-200 rounded-[2.5rem] flex flex-col items-center justify-center text-slate-400 hover:border-indigo-300 hover:bg-indigo-50 transition cursor-pointer mb-6">
                <div class="bg-white shadow-sm p-4 rounded-2xl mb-4 text-3xl">📁</div>
                <span class="text-lg font-bold text-slate-600">광고 성과 엑셀 파일을 드롭하세요</span>
                <span class="text-xs text-slate-400 mt-2 font-medium">항목포함: [날짜], [총비용], [구매완료전환매출액]</span>
                <input type="file" id="file-input" accept=".xlsx, .xls" class="hidden">
            </div>

            <div id="chart-container" class="h-[500px] hidden">
                <canvas id="mkt-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('업체명을 입력해주세요!');
            let url = (type === 'blog') ? `https://search.naver.com/search.naver?where=blog&query=${brand}&sm=tab_opt&nso=so%3Add%2Cp%3A1m`
                    : (type === 'cafe') ? `https://search.naver.com/search.naver?where=article&query=${brand}&sm=tab_opt&nso=so%3Add%2Cp%3A1m`
                    : (type === 'datalab') ? `https://datalab.naver.com/keyword/trendSearch.naver?keywordGroups[0].groupName=${brand}&keywordGroups[0].keywords[0]=${brand}`
                    : `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`;
            window.open(url, '_blank');
        }

        // 통합 계산기 로직
        function calcAll() {
            const spend = parseFloat(document.getElementById('roas-spend').value) || 0;
            const rev = parseFloat(document.getElementById('roas-revenue').value) || 0;
            const tRoas = parseFloat(document.getElementById('t-roas').value) || 0;
            
            // ROAS 계산
            const res = document.getElementById('roas-res');
            if(spend > 0) {
                const roas = (rev / spend) * 100;
                res.innerText = Math.round(roas) + '%';
                res.className = roas >= 300 ? "text-3xl font-black text-emerald-500 font-mono" : "text-3xl font-black text-rose-500 font-mono";
            } else { res.innerText = '0%'; res.className = "text-3xl font-black text-slate-300 font-mono"; }

            // 목표 매출액 계산
            document.getElementById('target-res').innerText = (spend > 0 && tRoas > 0) ? Math.round(spend * (tRoas/100)).toLocaleString() + '원' : '0원';
        }

        // 그래프 및 테마 로직
        let myChart = null;
        let currentData = null;
        const themes = {
            indigo: { main: 'rgba(99, 102, 241, 0.5)', line: 'rgb(79, 70, 229)', bg: 'rgba(99, 102, 241, 0.1)' },
            rose: { main: 'rgba(244, 63, 94, 0.5)', line: 'rgb(225, 29, 72)', bg: 'rgba(244, 63, 94, 0.1)' },
            emerald: { main: 'rgba(16, 185, 129, 0.5)', line: 'rgb(5, 150, 105)', bg: 'rgba(16, 185, 129, 0.1)' },
            amber: { main: 'rgba(245, 158, 11, 0.5)', line: 'rgb(217, 119, 6)', bg: 'rgba(245, 158, 11, 0.1)' }
        };
        let activeTheme = 'indigo';

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        dropZone.onclick = () => fileInput.click();
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
        dropZone.ondragover = (e) => e.preventDefault();
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                currentData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {raw: false});
                createChart();
            };
            reader.readAsArrayBuffer(file);
        }

        function createChart() {
            if (!currentData) return;
            const findKey = (row, target) => Object.keys(row).find(key => key.replace(/\s/g, '').includes(target.replace(/\s/g, '')));
            const first = currentData[0];
            const dK = findKey(first, '날짜') || Object.keys(first)[0];
            const cK = findKey(first, '총비용');
            const rK = findKey(first, '구매완료전환매출액');

            if (!cK || !rK) return alert('엑셀 항목을 확인해주세요 (총비용, 구매완료전환매출액 필함)');

            document.getElementById('chart-container').classList.remove('hidden');
            document.getElementById('drop-zone').classList.add('hidden');

            const ctx = document.getElementById('mkt-chart').getContext('2d');
            if (myChart) myChart.destroy();

            const theme = themes[activeTheme];
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: currentData.map(r => r[dK]),
                    datasets: [
                        { label: '매출액 (Bar)', data: currentData.map(r => parseFloat(String(r[rK]).replace(/,/g, ''))), backgroundColor: theme.main, borderRadius: 12, order: 2 },
                        { label: '광고비 (Line)', data: currentData.map(r => parseFloat(String(r[cK]).replace(/,/g, ''))), type: 'line', borderColor: theme.line, borderWidth: 4, pointRadius: 4, tension: 0.4, order: 1 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    scales: { y: { beginAtZero: true, grid: { display: false } } }
                }
            });
        }

        function changeTheme(color) {
            activeTheme = color;
            if (myChart) createChart();
        }

        function downloadChart() {
            const link = document.createElement('a');
            link.href = document.getElementById('mkt-chart').toDataURL('image/png');
            link.download = `report_${activeTheme}.png`;
            link.click();
        }
    </script>
</body>
</html>
