<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Less, Earn More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        :root {
            --main-brown: #634832;
            --sub-brown: #8b735b;
            --point-pink: #ff85a1;
            --bg-creamy: #fdfaf7;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-creamy);
            color: var(--main-brown);
            letter-spacing: -0.03em;
        }

        .premium-header {
            background: linear-gradient(135deg, var(--main-brown) 0%, #4a3525 100%);
            padding: 60px 20px;
            text-align: center;
            border-radius: 0 0 40px 40px;
        }

        .premium-header h1 { color: #fff; font-size: 3rem; font-weight: 900; font-style: italic; text-transform: uppercase; }
        .premium-header h1 span { color: var(--point-pink); }

        .tool-card { background: #fff; border-radius: 30px; padding: 35px; box-shadow: 0 15px 35px rgba(99, 72, 50, 0.08); border: 1px solid #eeebe8; margin-bottom: 30px; }
        .calc-input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #eeebe8; background: #fdfcfb; font-weight: 700; outline: none; transition: 0.2s; }
        .calc-input:focus { border-color: var(--point-pink); box-shadow: 0 0 0 3px rgba(255,133,161,0.1); }
        
        .tone-btn { width: 30px; height: 30px; border-radius: 50%; border: 3px solid #fff; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tone-btn.active { transform: scale(1.2); ring: 2px solid var(--point-pink); }
        
        .tab-btn { padding: 10px 20px; font-weight: 800; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--point-pink); color: #fff; }

        b { color: var(--point-pink); }
    </style>
</head>
<body class="pb-20">

    <header class="premium-header mb-10">
        <h1>Work Less, <span>Earn More</span></h1>
        <p class="text-white/60 font-bold tracking-[0.3em] text-xs mt-2">PREMIUM MARKETING WORKSPACE</p>
    </header>

    <div class="max-w-5xl mx-auto px-5">
        
        <div class="tool-card">
            <h2 class="text-xl font-black mb-6 flex items-center gap-2">🔍 실시간 트렌드 체크</h2>
            <div class="flex flex-col md:flex-row gap-3">
                <input id="search-brand" type="text" placeholder="키워드를 입력하세요" class="flex-1 p-4 rounded-xl border-2 border-stone-100 outline-none focus:border-pink-300 font-bold text-lg">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <button onclick="monitor('blackkiwi')" class="p-3 rounded-xl bg-stone-100 font-black hover:bg-pink-100 hover:text-pink-500 transition text-sm">🥝 블랙키위</button>
                    <button onclick="monitor('naver')" class="p-3 rounded-xl bg-stone-100 font-black hover:bg-green-100 hover:text-green-600 transition text-sm">💚 네이버</button>
                    <button onclick="monitor('insta')" class="p-3 rounded-xl bg-stone-100 font-black hover:bg-purple-100 hover:text-purple-600 transition text-sm">📸 인스타</button>
                    <button onclick="monitor('youtube')" class="p-3 rounded-xl bg-stone-100 font-black hover:bg-red-100 hover:text-red-600 transition text-sm">🔴 유튜브</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="tool-card mb-0">
                <h3 class="text-lg font-black mb-5 italic">🎯 ROAS 계산기</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input id="calc-spend" type="number" oninput="runCalc()" placeholder="광고비" class="calc-input">
                    <input id="calc-rev" type="number" oninput="runCalc()" placeholder="매출액" class="calc-input">
                </div>
                <div id="res-roas" class="mt-6 text-center text-5xl font-black text-stone-200">0%</div>
            </div>
            <div class="tool-card mb-0">
                <h3 class="text-lg font-black mb-5 italic">🎯 목표 매출 계산기</h3>
                <div class="grid grid-cols-2 gap-3">
                    <input id="target-spend" type="number" oninput="runCalc()" placeholder="예산" class="calc-input">
                    <input id="target-roas" type="number" oninput="runCalc()" placeholder="목표(%)" class="calc-input">
                </div>
                <div id="res-target-rev" class="mt-6 text-right text-3xl font-black text-stone-400">0원</div>
            </div>
        </div>

        <div class="tool-card">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-5 mb-8">
                <div>
                    <h2 class="text-2xl font-black">📊 데이터 시각화 리포트</h2>
                    <p class="text-stone-400 text-sm font-bold">엑셀 파일을 올리면 그래프가 자동 생성됩니다.</p>
                </div>
                <div class="flex items-center gap-3 bg-stone-50 p-3 rounded-2xl border border-stone-100">
                    <span class="text-xs font-bold text-stone-400 mr-2">COLOR TONE</span>
                    <div onclick="setChartColor('#ff85a1', this)" class="tone-btn active" style="background-color: #ff85a1;"></div>
                    <div onclick="setChartColor('#634832', this)" class="tone-btn" style="background-color: #634832;"></div>
                    <div onclick="setChartColor('#4ade80', this)" class="tone-btn" style="background-color: #4ade80;"></div>
                    <div onclick="setChartColor('#60a5fa', this)" class="tone-btn" style="background-color: #60a5fa;"></div>
                    <div onclick="setChartColor('#fbbf24', this)" class="tone-btn" style="background-color: #fbbf24;"></div>
                </div>
            </div>

            <div id="drop-zone" onclick="document.getElementById('file-input').click()" class="w-full h-48 border-4 border-dashed border-stone-100 rounded-[2rem] flex flex-col items-center justify-center text-stone-300 hover:border-pink-200 hover:bg-pink-50/30 transition-all cursor-pointer">
                <span class="text-lg font-black italic">파일을 여기로 드래그하거나 클릭하세요 📁</span>
                <input type="file" id="file-input" class="hidden" onchange="handleFiles(this.files)">
            </div>
            <div id="chart-wrapper" class="hidden h-[400px] mt-5">
                <canvas id="mkt-chart"></canvas>
            </div>
        </div>

    </div>

    <script>
        let activeColor = '#ff85a1';
        let rawDataStore = [];
        let myChart = null;

        // 1. 키워드 검색기 함수
        function monitor(type) {
            const keyword = document.getElementById('search-brand').value;
            if(!keyword) return alert('키워드를 입력해주세요!');
            
            const urls = {
                blackkiwi: `https://blackkiwi.net/service/check-keyword?keyword=${encodeURIComponent(keyword)}`,
                naver: `https://search.naver.com/search.naver?query=${encodeURIComponent(keyword)}`,
                insta: `https://www.instagram.com/explore/tags/${encodeURIComponent(keyword)}/`,
                youtube: `https://www.youtube.com/results?search_query=${encodeURIComponent(keyword)}`
            };
            window.open(urls[type], '_blank');
        }

        // 2. 계산기 함수
        function runCalc() {
            // ROAS 계산
            const s1 = parseFloat(document.getElementById('calc-spend').value) || 0;
            const r1 = parseFloat(document.getElementById('calc-rev').value) || 0;
            const resRoas = document.getElementById('res-roas');
            if(s1 > 0) {
                const roas = Math.round((r1 / s1) * 100);
                resRoas.innerText = roas + '%';
                resRoas.style.color = '#ff85a1';
            }

            // 목표 매출 계산
            const s2 = parseFloat(document.getElementById('target-spend').value) || 0;
            const tRoas = parseFloat(document.getElementById('target-roas').value) || 0;
            const resTarget = document.getElementById('res-target-rev');
            if(s2 > 0 && tRoas > 0) {
                const targetRev = Math.round(s2 * (tRoas / 100));
                resTarget.innerText = targetRev.toLocaleString() + '원';
                resTarget.style.color = '#634832';
            }
        }

        // 3. 그래프 컬러 선택
        function setChartColor(hex, el) {
            activeColor = hex;
            document.querySelectorAll('.tone-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
            if(rawDataStore.length > 0) updateChart();
        }

        // 4. 파일 처리 및 그래프 생성
        function handleFiles(files) {
            const file = files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                rawDataStore = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                updateChart();
            };
            reader.readAsArrayBuffer(file);
        }

        function updateChart() {
            if (rawDataStore.length < 2) return;
            const labels = [];
            const values = [];

            // 샘플 데이터 추출 (A열 라벨, B열 데이터)
            for(let i = 1; i < Math.min(rawDataStore.length, 11); i++) {
                labels.push(rawDataStore[i][0] || `Data ${i}`);
                values.push(rawDataStore[i][1] || 0);
            }

            document.getElementById('chart-wrapper').classList.remove('hidden');
            document.getElementById('drop-zone').classList.add('hidden');

            const ctx = document.getElementById('mkt-chart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Performance Data',
                        data: values,
                        backgroundColor: activeColor,
                        borderRadius: 10
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
