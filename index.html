<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Marketing Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tool-card { @apply bg-white p-6 rounded-3xl shadow-sm border border-slate-100 transition-all hover:shadow-lg; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-900">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">🚀 AE Command Center</h1>
                <p class="text-slate-500 mt-1 font-medium">지윤 AE의 업무 효율 극대화 보드</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-slate-400 text-right">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="tool-card">
                <h2 class="text-lg font-bold text-indigo-600 mb-4">🔍 데이터 퀵 모니터링 (최신순)</h2>
                <input id="search-brand" type="text" placeholder="분석할 업체명 입력" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold mb-4 border border-slate-100">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="monitor('blog')" class="py-3 px-4 rounded-xl bg-green-50 text-green-700 border border-green-200 font-bold hover:bg-green-100 transition text-sm">🟢 블로그 (1달/최신순)</button>
                    <button onclick="monitor('cafe')" class="py-3 px-4 rounded-xl bg-emerald-50 text-emerald-700 border border-emerald-200 font-bold hover:bg-emerald-100 transition text-sm">☕ 카페 (1달/최신순)</button>
                    <button onclick="monitor('datalab')" class="py-3 px-4 rounded-xl bg-blue-50 text-blue-700 border border-blue-200 font-bold hover:bg-blue-100 transition text-sm">📉 검색 트렌드 (데이터랩)</button>
                    <button onclick="monitor('insta')" class="py-3 px-4 rounded-xl bg-pink-50 text-pink-700 border border-pink-200 font-bold hover:bg-pink-100 transition text-sm">📸 인스타 태그</button>
                </div>
            </div>

            <div class="tool-card">
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center justify-between">📊 위클리 수치 기록 <button onclick="saveStats()" class="text-xs bg-slate-800 text-white px-3 py-1 rounded-full">저장</button></h2>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center">
                        <label class="text-[10px] text-slate-400 font-bold uppercase">블로그 글</label>
                        <input id="stat-blog" type="text" placeholder="000" class="w-full mt-1 p-2 bg-slate-50 rounded text-center font-bold outline-none border-b-2 border-green-500 text-sm">
                    </div>
                    <div class="text-center">
                        <label class="text-[10px] text-slate-400 font-bold uppercase">카페 언급</label>
                        <input id="stat-cafe" type="text" placeholder="000" class="w-full mt-1 p-2 bg-slate-50 rounded text-center font-bold outline-none border-b-2 border-emerald-500 text-sm">
                    </div>
                    <div class="text-center">
                        <label class="text-[10px] text-slate-400 font-bold uppercase">인스타 태그</label>
                        <input id="stat-insta" type="text" placeholder="000" class="w-full mt-1 p-2 bg-slate-50 rounded text-center font-bold outline-none border-b-2 border-pink-500 text-sm">
                    </div>
                </div>
            </div>
        </div>

        <div class="tool-card relative mb-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-slate-800">📊 보고서용 마케팅 성과 그래프</h2>
                <button onclick="downloadChart()" class="text-xs bg-indigo-600 text-white px-4 py-2 rounded-full font-bold shadow-md hover:bg-indigo-700">이미지 저장 (PNG)</button>
            </div>
            
            <div id="drop-zone" class="w-full h-44 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center text-slate-400 hover:border-indigo-300 hover:bg-indigo-50 transition cursor-pointer mb-6">
                <span class="text-4xl mb-2">📈</span>
                <span class="text-sm font-bold text-slate-600">엑셀 파일을 드래그하여 업로드</span>
                <span class="text-[11px] text-slate-400 mt-2">필수 포함 단어: [날짜], [총비용], [구매완료전환매출액]</span>
                <input type="file" id="file-input" accept=".xlsx, .xls" class="hidden">
            </div>

            <div id="chart-container" class="h-96 hidden">
                <canvas id="mkt-chart"></canvas>
            </div>
        </div>
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('업체명을 입력해주세요!');
            let url = "";
            if(type === 'blog') url = `https://search.naver.com/search.naver?where=blog&query=${brand}&sm=tab_opt&nso=so%3Add%2Cp%3A1m`;
            if(type === 'cafe') url = `https://search.naver.com/search.naver?where=article&query=${brand}&sm=tab_opt&nso=so%3Add%2Cp%3A1m`;
            if(type === 'datalab') url = `https://datalab.naver.com/keyword/trendSearch.naver?keywordGroups[0].groupName=${brand}&keywordGroups[0].keywords[0]=${brand}`;
            if(type === 'insta') url = `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`;
            window.open(url, '_blank');
        }

        function saveStats() {
            localStorage.setItem('ae_stats', JSON.stringify({
                blog: document.getElementById('stat-blog').value,
                cafe: document.getElementById('stat-cafe').value,
                insta: document.getElementById('stat-insta').value
            }));
            alert('기록이 저장되었습니다!');
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('ae_stats') || '{}');
            document.getElementById('stat-blog').value = saved.blog || '';
            document.getElementById('stat-cafe').value = saved.cafe || '';
            document.getElementById('stat-insta').value = saved.insta || '';
        }

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        let myChart = null;

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-indigo-50'); };
        dropZone.ondragleave = () => dropZone.classList.remove('bg-indigo-50');
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {raw: false});
                createChart(json);
            };
            reader.readAsArrayBuffer(file);
        }

        function createChart(data) {
            if (data.length === 0) return alert('데이터가 없습니다.');

            const findKey = (row, targetName) => {
                return Object.keys(row).find(key => key.replace(/\s/g, '').includes(targetName.replace(/\s/g, '')));
            };

            const firstRow = data[0];
            const dateKey = findKey(firstRow, '날짜') || Object.keys(firstRow)[0];
            const costKey = findKey(firstRow, '총비용'); // 광고비
            const revenueKey = findKey(firstRow, '구매완료전환매출액'); // 매출액

            if (!costKey || !revenueKey) {
                return alert('엑셀 항목명을 확인해주세요!\n포함되어야 할 단어: 총비용, 구매완료전환매출액');
            }

            const labels = data.map(row => row[dateKey]);
            const costs = data.map(row => parseFloat(String(row[costKey]).replace(/,/g, '')) || 0);
            const revenues = data.map(row => parseFloat(String(row[revenueKey]).replace(/,/g, '')) || 0);

            document.getElementById('chart-container').classList.remove('hidden');
            document.getElementById('drop-zone').classList.add('hidden');

            const ctx = document.getElementById('mkt-chart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '매출액 (구매완료 전환매출액)',
                            data: revenues,
                            backgroundColor: 'rgba(99, 102, 241, 0.4)',
                            borderColor: 'rgb(99, 102, 241)',
                            borderWidth: 1,
                            borderRadius: 8,
                            yAxisID: 'y'
                        },
                        {
                            label: '광고비 (총비용)',
                            data: costs,
                            type: 'line',
                            borderColor: 'rgb(249, 115, 22)',
                            borderWidth: 3,
                            pointBackgroundColor: 'rgb(249, 115, 22)',
                            fill: false,
                            tension: 0.4,
                            yAxisID: 'y'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top', labels: { boxWidth: 12, font: { size: 12, weight: 'bold' } } },
                        title: { display: true, text: '광고 집행 대비 매출 효율 분석', font: { size: 18, weight: 'black' }, padding: 20 }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }

        function downloadChart() {
            if (!myChart) return alert('그래프를 먼저 생성해주세요!');
            const link = document.createElement('a');
            link.href = document.getElementById('mkt-chart').toDataURL('image/png');
            link.download = `mkt_performance_${new Date().toISOString().slice(0,10)}.png`;
            link.click();
        }
    </script>
</body>
</html>
