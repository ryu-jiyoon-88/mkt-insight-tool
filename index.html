<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AE Marketing Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tool-card { @apply bg-white p-6 rounded-2xl shadow-sm border border-slate-200 transition-all hover:shadow-md; }
        .btn-action { @apply flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all flex items-center justify-center gap-2; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans text-slate-900">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-6">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">🚀 AE Command Center</h1>
                <p class="text-slate-500 mt-1 font-medium">지윤 AE의 디지털 영향력 분석 보드</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-slate-400">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            
            <div class="tool-card lg:col-span-2">
                <h2 class="text-lg font-bold text-indigo-600 mb-4 flex items-center gap-2">🔍 디지털 영향력 퀵 체크</h2>
                <div class="flex gap-2 mb-6">
                    <input id="search-brand" type="text" placeholder="분석할 업체명/제품명 입력" class="flex-[2] p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold">
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                    <button onclick="quickSearch('blog')" class="btn-action bg-green-50 text-green-700 border border-green-200 hover:bg-green-100">
                        🟢 블로그 리뷰
                    </button>
                    <button onclick="quickSearch('insta')" class="btn-action bg-pink-50 text-pink-700 border border-pink-200 hover:bg-pink-100">
                        📸 인스타 태그
                    </button>
                    <button onclick="quickSearch('news')" class="btn-action bg-blue-50 text-blue-700 border border-blue-200 hover:bg-blue-100">
                        📰 관련 뉴스
                    </button>
                    <button onclick="quickSearch('black')" class="btn-action bg-slate-800 text-white hover:bg-slate-700">
                        🥝 블랙키위 분석
                    </button>
                </div>
                <p class="text-[11px] text-slate-400 mt-4 text-center">※ 업체명 입력 후 버튼을 누르면 각 채널의 검색 결과가 새 탭으로 열립니다.</p>
            </div>

            <div class="tool-card">
                <h2 class="text-lg font-bold text-orange-600 mb-4 flex items-center gap-2">💰 목표 매출 계산</h2>
                <div class="space-y-3">
                    <input id="target-spend" type="number" oninput="calcTarget()" placeholder="예상 광고비" class="w-full p-3 bg-slate-50 rounded-lg outline-none text-sm">
                    <input id="target-roas" type="number" oninput="calcTarget()" placeholder="목표 ROAS (%)" class="w-full p-3 bg-slate-50 rounded-lg outline-none text-sm">
                    <div class="p-4 bg-orange-50 rounded-xl text-center border border-orange-100">
                        <span id="target-res" class="text-2xl font-black text-orange-700 font-mono">0원</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="tool-card">
                <h2 class="text-lg font-bold text-emerald-600 mb-4">📊 ROAS 계산기</h2>
                <div class="space-y-3">
                    <input id="spend" type="number" oninput="calcROAS()" placeholder="광고비" class="w-full p-3 bg-slate-50 rounded-lg outline-none text-sm">
                    <input id="revenue" type="number" oninput="calcROAS()" placeholder="매출액" class="w-full p-3 bg-slate-50 rounded-lg outline-none text-sm">
                    <div id="roas-box" class="p-4 bg-slate-50 rounded-xl text-center transition-colors">
                        <span id="roas-res" class="text-2xl font-black text-slate-400 font-mono">0%</span>
                    </div>
                </div>
            </div>

            <div class="tool-card lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold text-indigo-600">📝 전략 분석 리포트</h2>
                    <button onclick="saveMemo()" class="text-xs bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full font-bold">자동 저장됨</button>
                </div>
                <textarea id="memo" class="w-full h-40 p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm leading-relaxed" placeholder="AI 분석 결과나 경쟁사 특징을 기록해 두세요. 브라우저에 안전하게 저장됩니다."></textarea>
            </div>
        </div>
    </div>

    <script>
        // 시계
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        // 빠른 검색 기능
        function quickSearch(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('업체명을 입력해주세요!');
            
            let url = "";
            if(type === 'blog') url = `https://search.naver.com/search.naver?where=post&query=${brand}`;
            if(type === 'insta') url = `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`;
            if(type === 'news') url = `https://search.naver.com/search.naver?where=news&query=${brand}`;
            if(type === 'black') url = `https://blackkiwi.net/service/keyword-analysis?keyword=${brand}`;
            
            window.open(url, '_blank');
        }

        // 목표 매출 계산
        function calcTarget() {
            const s = parseFloat(document.getElementById('target-spend').value) || 0;
            const r = parseFloat(document.getElementById('target-roas').value) || 0;
            const res = document.getElementById('target-res');
            res.innerText = s > 0 && r > 0 ? Math.round(s * (r/100)).toLocaleString() + '원' : '0원';
        }

        // 실시간 ROAS
        function calcROAS() {
            const s = parseFloat(document.getElementById('spend').value) || 0;
            const r = parseFloat(document.getElementById('revenue').value) || 0;
            const res = document.getElementById('roas-res');
            const box = document.getElementById('roas-box');
            if(s > 0) {
                const roas = (r/s)*100;
                res.innerText = roas.toLocaleString(undefined, {maximumFractionDigits:1}) + '%';
                if(roas >= 300) { res.className = "text-2xl font-black text-emerald-700 font-mono"; box.className = "p-4 bg-emerald-50 rounded-xl text-center border border-emerald-100"; }
                else { res.className = "text-2xl font-black text-rose-600 font-mono"; box.className = "p-4 bg-rose-50 rounded-xl text-center border border-rose-100"; }
            } else { res.innerText = '0%'; res.className = "text-2xl font-black text-slate-300 font-mono"; box.className = "p-4 bg-slate-50 rounded-xl text-center"; }
        }

        // 메모 기능
        function saveMemo() { localStorage.setItem('ae_memo', document.getElementById('memo').value); }
        document.getElementById('memo').oninput = saveMemo;
        window.onload = () => { document.getElementById('memo').value = localStorage.getItem('ae_memo') || ''; }
    </script>
</body>
</html>
