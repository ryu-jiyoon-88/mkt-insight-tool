<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>적게 일하고 많이 벌기 프로젝트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        :root {
            --bg-ivory: #F9F7F2;
            --card-white: #FFFFFF;
            --text-main: #4A4A4A;
        }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-ivory);
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .tool-card { 
            @apply bg-white p-10 rounded-[3rem] shadow-sm border border-orange-100/50 transition-all duration-300;
        }
        
        .tool-card:hover { @apply shadow-xl shadow-orange-200/20 translate-y-[-2px]; }

        .tab-btn { 
            @apply px-10 py-5 font-black text-slate-300 transition-all duration-300 relative; 
        }
        .tab-btn.active { @apply text-orange-400; }
        .tab-btn.active::after {
            content: '';
            @apply absolute bottom-0 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-orange-300 rounded-full;
        }

        .theme-btn { 
            @apply w-10 h-10 rounded-2xl border-4 border-white shadow-sm cursor-pointer transition-all hover:scale-110 active:scale-95; 
        }
        .theme-btn.active { @apply ring-2 ring-orange-200; }

        input, textarea {
            @apply bg-[#FCFBF9] border border-orange-100 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-orange-200 transition-all font-medium;
        }

        button.primary {
            @apply bg-orange-400 text-white font-black py-4 px-8 rounded-2xl hover:bg-orange-500 transition-all active:scale-95 shadow-lg shadow-orange-200;
        }

        .drop-zone {
            @apply w-full border-4 border-dashed border-orange-100 rounded-[3rem] flex flex-col items-center justify-center transition-all cursor-pointer hover:bg-orange-50/50;
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-6xl mx-auto p-6 md:p-12">
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div class="space-y-2">
                <h1 class="text-5xl font-black text-slate-800 tracking-tighter">💰 적게 일하고 많이 벌기</h1>
                <p id="quote-display" class="text-orange-400 font-bold italic text-xl">✨ 행복한 하루 되세요!</p>
            </div>
            
            <div class="flex flex-col items-end gap-4">
                <div id="clock" class="text-2xl font-mono font-black text-orange-200 italic">00:00:00</div>
                <div class="flex gap-2 p-2 bg-white rounded-3xl shadow-sm border border-orange-50">
                    <div onclick="changeTheme('indigo', this)" class="theme-btn bg-indigo-400"></div>
                    <div onclick="changeTheme('rose', this)" class="theme-btn bg-rose-400"></div>
                    <div onclick="changeTheme('emerald', this)" class="theme-btn bg-emerald-400 active"></div>
                    <div onclick="changeTheme('amber', this)" class="theme-btn bg-amber-400"></div>
                </div>
            </div>
        </header>

        <nav class="flex gap-4 mb-10 justify-center">
            <button onclick="switchTab('mkt')" id="tab-mkt" class="tab-btn active text-2xl">📈 마케팅 분석</button>
            <button onclick="switchTab('profit')" id="tab-profit" class="tab-btn text-2xl">💸 수익 분석</button>
        </nav>

        <div id="view-mkt" class="tab-content space-y-10">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="tool-card lg:col-span-2">
                    <h2 class="text-xl font-black text-orange-400 mb-6 italic">🔍 트렌드 체크</h2>
                    <input id="search-brand" type="text" placeholder="분석할 업체명을 입력해볼까요?" class="w-full text-lg mb-6">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <button onclick="monitor('blog')" class="py-4 rounded-2xl bg-green-50 text-green-700 font-black border border-green-100 hover:bg-green-100">블로그</button>
                        <button onclick="monitor('cafe')" class="py-4 rounded-2xl bg-emerald-50 text-emerald-700 font-black border border-emerald-100 hover:bg-emerald-100">카페</button>
                        <button onclick="monitor('datalab')" class="py-4 rounded-2xl bg-blue-50 text-blue-700 font-black border border-blue-100 hover:bg-blue-100">데이터랩</button>
                        <button onclick="monitor('insta')" class="py-4 rounded-2xl bg-pink-50 text-pink-700 font-black border border-pink-100 hover:bg-pink-100">인스타</button>
                    </div>
                </div>
                <div class="tool-card">
                    <h2 class="text-xl font-black text-slate-800 mb-6 italic">⚖️ 퀵 계산기</h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <input id="roas-spend" type="number" oninput="calcAll()" placeholder="광고비" class="text-sm">
                            <input id="roas-revenue" type="number" oninput="calcAll()" placeholder="매출액" class="text-sm">
                        </div>
                        <div class="p-6 bg-[#FDFCFB] rounded-[2rem] text-center border border-orange-50">
                            <span id="roas-res" class="text-4xl font-black text-slate-200 font-mono">0%</span>
                        </div>
                        <div class="pt-4 border-t border-dashed border-orange-100">
                            <input id="t-roas" type="number" oninput="calcAll()" placeholder="목표 ROAS (%)" class="w-full text-sm">
                            <div id="target-res" class="mt-3 text-right font-black text-orange-400 font-mono text-lg">0원</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tool-card">
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-3xl font-black text-slate-800 italic tracking-tighter">📊 Performance Graph</h2>
                    <button onclick="downloadPNG('mkt-chart')" class="text-sm bg-slate-800 text-white px-6 py-3 rounded-2xl font-black hover:opacity-90">PNG 저장</button>
                </div>
                <div id="drop-zone-mkt" class="drop-zone h-80">
                    <div class="text-5xl mb-4">☁️</div>
                    <span class="text-2xl font-black text-slate-400">그래프로 만들기!</span>
                    <p class="text-sm text-slate-300 mt-2 font-bold">여기에 파일을 살짝 놓아주세요</p>
                    <input type="file" id="file-mkt" class="hidden" onchange="handleMktFile(this.files[0])">
                </div>
                <div id="chart-container-mkt" class="h-[550px] hidden mt-6"><canvas id="mkt-chart"></canvas></div>
            </div>
        </div>

        <div id="view-profit" class="tab-content hidden space-y-10">
            <div class="tool-card !p-8 bg-orange-50/30 border-orange-100">
                <details class="group">
                    <summary class="list-none cursor-pointer flex justify-between items-center">
                        <h2 class="text-xl font-black text-orange-500 italic">⚙️ 제품 마스터 설정 (여기를 눌러 원가를 입력하세요)</h2>
                        <span class="group-open:rotate-180 transition-transform text-orange-400">▼</span>
                    </summary>
                    <div class="mt-6 space-y-4">
                        <textarea id="master-input" class="w-full h-40 bg-white" placeholder="제품명,판매가,공급가,수수료율(%) 형식으로 입력해주세요!"></textarea>
                        <button onclick="saveMaster()" class="primary w-full">마스터 정보 업데이트</button>
                    </div>
                </details>
            </div>

            <div class="tool-card">
                <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                    <h2 class="text-3xl font-black text-slate-800 italic tracking-tighter">💸 Profit Analysis</h2>
                    <button onclick="exportProfitExcel()" class="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black shadow-lg shadow-emerald-100">통합 리포트 다운로드</button>
                </div>
                
                <div id="drop-zone-profit" class="drop-zone h-56 border-emerald-100 hover:bg-emerald-50/50 mb-10">
                    <div class="text-4xl mb-3">📁</div>
                    <span class="text-xl font-black text-emerald-300">발주/매출 파일을 여기에 드롭!</span>
                    <input type="file" id="file-profit" multiple class="hidden" onchange="handleProfitFiles(this.files)">
                </div>

                <div id="profit-chart-box" class="h-[500px] hidden mb-10 p-8 bg-[#FDFCFB] rounded-[3rem] border border-orange-50">
                    <canvas id="profit-chart"></canvas>
                </div>

                <div id="profit-table-box" class="overflow-x-auto hidden">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="bg-orange-50/50 text-orange-400 uppercase font-black text-[11px] tracking-widest">
                                <th class="p-5 rounded-l-2xl">구분</th><th class="p-5">제품명</th><th class="p-5 text-right">수량</th><th class="p-5 text-right">매출액</th><th class="p-5 text-right font-black rounded-r-2xl">본사마진</th>
                            </tr>
                        </thead>
                        <tbody id="profit-table-body" class="divide-y divide-orange-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 설정 및 테마 ---
        const themes = {
            indigo: { main: '#818cf8', light: 'rgba(129, 140, 248, 0.2)' },
            rose: { main: '#fb7185', light: 'rgba(251, 113, 133, 0.2)' },
            emerald: { main: '#34d399', light: 'rgba(52, 211, 153, 0.2)' },
            amber: { main: '#fbbf24', light: 'rgba(251, 191, 36, 0.2)' }
        };
        let activeTheme = 'emerald';
        let masterData = {};
        let analyzedData = [];
        let mktChart = null;
        let profitChart = null;

        // 명언 및 시계
        const quotes = ["성공은 행동하는 사람의 것이다.", "오늘의 노력이 내일의 ROAS를 만든다.", "도전하지 않는 것이 가장 큰 위험이다.", "당신은 생각보다 훨씬 더 잘하고 있어요!"];
        document.getElementById('quote-display').innerText = `✨ "${quotes[Math.floor(Math.random() * quotes.length)]}"`;
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`view-${tab}`).classList.remove('hidden');
        }

        function changeTheme(color, el) {
            document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            activeTheme = color;
            if (mktChart) handleMktFile(currentMktFile);
            if (profitChart) updateProfitVisuals();
        }

        // --- 마케팅 분석 로직 ---
        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('업체명을 적어주세요! 😊');
            const urls = {
                blog: `https://search.naver.com/search.naver?where=blog&query=${brand}`,
                cafe: `https://search.naver.com/search.naver?where=article&query=${brand}`,
                datalab: `https://datalab.naver.com/keyword/trendSearch.naver?keywordGroups[0].groupName=${brand}&keywordGroups[0].keywords[0]=${brand}`,
                insta: `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`
            };
            window.open(urls[type], '_blank');
        }

        function calcAll() {
            const spend = Number(document.getElementById('roas-spend').value) || 0;
            const rev = Number(document.getElementById('roas-revenue').value) || 0;
            const tRoas = Number(document.getElementById('t-roas').value) || 0;
            const roas = (rev / spend) * 100 || 0;
            const res = document.getElementById('roas-res');
            res.innerText = Math.round(roas) + '%';
            res.className = "text-4xl font-black font-mono " + (roas >= 300 ? "text-emerald-400" : "text-rose-400");
            document.getElementById('target-res').innerText = (spend * (tRoas/100)).toLocaleString() + '원';
        }

        let currentMktFile = null;
        async function handleMktFile(file) {
            if(!file) return;
            currentMktFile = file;
            const data = await readExcel(file);
            document.getElementById('drop-zone-mkt').classList.add('hidden');
            document.getElementById('chart-container-mkt').classList.remove('hidden');
            
            const labels = data.map(r => r['시간대별'] || r['날짜']);
            const costs = data.map(r => Number(String(r['총비용']).replace(/,/g, '')) || 0);
            const revenues = data.map(r => Number(String(r['구매완료 전환매출액(원)']).replace(/,/g, '')) || 0);
            const roasArr = costs.map((c, i) => c > 0 ? Math.round((revenues[i]/c)*100) : 0);

            const ctx = document.getElementById('mkt-chart').getContext('2d');
            if(mktChart) mktChart.destroy();
            mktChart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'ROAS (%)', type: 'line', data: roasArr, borderColor: themes[activeTheme].main, borderWidth: 5, yAxisID: 'y1', tension: 0.4, pointRadius: 0 },
                        { label: '매출액', type: 'bar', data: revenues, backgroundColor: themes[activeTheme].light, borderRadius: 12, yAxisID: 'y' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        // --- 수익 분석 로직 ---
        function saveMaster() {
            const input = document.getElementById('master-input').value;
            input.split('\n').forEach(line => {
                const [name, price, cost, rate] = line.split(',');
                if(name) masterData[name.trim()] = { price: Number(price), cost: Number(cost), rate: Number(rate)/100 };
            });
            alert('마스터 데이터가 업데이트 되었어요! ✨');
        }

        async function handleProfitFiles(files) {
            analyzedData = [];
            for(let file of files) {
                const data = await readExcel(file);
                data.forEach(row => {
                    const pName = (row['제품명'] || row['상품명'] || '').trim();
                    const qty = Number(row['수량']) || 1;
                    const mInfo = masterData[pName] || { price: 0, rate: 0 };
                    const revenue = mInfo.price * qty || Number(row['매출액']) || 0;
                    const hqProfit = revenue * mInfo.rate;
                    if(pName) analyzedData.push({ store: row['매장명'] || file.name.split('.')[0], pName, qty, revenue, hqProfit, rate: mInfo.rate * 100 });
                });
            }
            updateProfitVisuals();
        }

        function updateProfitVisuals() {
            document.getElementById('profit-chart-box').classList.remove('hidden');
            document.getElementById('profit-table-box').classList.remove('hidden');
            
            const tbody = document.getElementById('profit-table-body');
            tbody.innerHTML = analyzedData.map(d => `
                <tr class="hover:bg-orange-50/20 transition-colors">
                    <td class="p-5 font-bold text-slate-400">${d.store}</td>
                    <td class="p-5 font-black text-slate-600">${d.pName}</td>
                    <td class="p-5 text-right font-bold">${d.qty}</td>
                    <td class="p-5 text-right">${d.revenue.toLocaleString()}원</td>
                    <td class="p-5 text-right font-black text-orange-400">${d.hqProfit.toLocaleString()}원</td>
                </tr>
            `).join('');

            const summary = {};
            analyzedData.forEach(d => {
                if(!summary[d.pName]) summary[d.pName] = { profit: 0, rate: d.rate };
                summary[d.pName].profit += d.hqProfit;
            });

            const labels = Object.keys(summary);
            const ctx = document.getElementById('profit-chart').getContext('2d');
            if(profitChart) profitChart.destroy();
            profitChart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { label: '본사 마진액', type: 'bar', data: labels.map(l => summary[l].profit), backgroundColor: themes[activeTheme].light, borderRadius: 20, yAxisID: 'y' },
                        { label: '실마진율 (%)', type: 'line', data: labels.map(l => summary[l].rate), borderColor: themes[activeTheme].main, borderWidth: 4, yAxisID: 'y1', tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function readExcel(file) {
            return new Promise(res => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    res(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]));
                };
                reader.readAsArrayBuffer(file);
            });
        }

        function exportProfitExcel() {
            const ws = XLSX.utils.json_to_sheet(analyzedData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "ProfitReport");
            XLSX.writeFile(wb, `통합수익리포트_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        function downloadPNG(id) {
            const link = document.createElement('a');
            link.href = document.getElementById(id).toDataURL('image/png');
            link.download = 'Analysis_Report.png';
            link.click();
        }

        // 드래그앤드롭 바인딩
        const bindDrop = (id, callback) => {
            const zone = document.getElementById(id);
            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('bg-orange-50'); };
            zone.ondragleave = () => zone.classList.remove('bg-orange-50');
            zone.ondrop = (e) => { e.preventDefault(); zone.classList.remove('bg-orange-50'); callback(e.dataTransfer.files); };
            zone.onclick = () => zone.querySelector('input').click();
        };
        bindDrop('drop-zone-mkt', (f) => handleMktFile(f[0]));
        bindDrop('drop-zone-profit', (f) => handleProfitFiles(f));
    </script>
</body>
</html>
