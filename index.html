<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better Life Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .tool-card { @apply bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 transition-all; }
        .tab-btn { @apply px-6 py-3 font-bold text-slate-400 border-b-2 border-transparent transition-all; }
        .tab-btn.active { @apply text-indigo-600 border-indigo-600; }
        .calc-input { @apply w-full p-3 bg-slate-50 rounded-xl outline-none border border-slate-100 font-bold text-sm focus:ring-2 focus:ring-indigo-500; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div class="max-w-7xl mx-auto p-6 md:p-10">
        <header class="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b pb-6">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tight italic">✨ Work Less, Play More!</h1>
                <p class="text-slate-500 mt-2 font-bold text-lg text-indigo-600">즐거운 인생을 위한 '적게 일하고 많이 벌기' 프로젝트</p>
            </div>
            <div id="clock" class="text-xl font-mono font-bold text-slate-300">00:00:00</div>
        </header>

        <div class="flex gap-4 mb-8 border-b">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="tab-btn active">📈 Dashboard</button>
            <button onclick="switchTab('manager')" id="tab-manager" class="tab-btn">📁 Data Manager</button>
        </div>

        <div id="content-dashboard" class="space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="tool-card lg:col-span-2">
                    <h2 class="text-xl font-bold text-indigo-600 mb-6 flex items-center gap-2">🔍 실시간 트렌드</h2>
                    <input id="search-brand" type="text" placeholder="분석할 키워드를 입력하세요" class="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-bold mb-6 border border-slate-100 text-lg">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <button onclick="monitor('blog')" class="py-4 rounded-2xl bg-green-50 text-green-700 border border-green-100 font-bold hover:bg-green-100 transition text-sm">🟢 블로그</button>
                        <button onclick="monitor('cafe')" class="py-4 rounded-2xl bg-emerald-50 text-emerald-700 border border-emerald-100 font-bold hover:bg-emerald-100 transition text-sm">☕ 카페</button>
                        <button onclick="monitor('datalab')" class="py-4 rounded-2xl bg-blue-50 text-blue-700 border border-blue-200 font-bold hover:bg-blue-100 transition text-sm">📉 데이터랩</button>
                        <button onclick="monitor('insta')" class="py-4 rounded-2xl bg-pink-50 text-pink-700 border border-pink-200 font-bold hover:bg-pink-100 transition text-sm">📸 인스타</button>
                    </div>
                </div>

                <div class="tool-card border-2 border-indigo-50">
                    <h2 class="text-xl font-bold text-slate-800 mb-6 italic">🎯 퀵 계산기</h2>
                    <div class="space-y-6">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block">ROAS 확인</label>
                            <div class="grid grid-cols-2 gap-2 mb-3">
                                <input id="roas-spend" type="number" oninput="calculate()" placeholder="광고비" class="calc-input">
                                <input id="roas-revenue" type="number" oninput="calculate()" placeholder="매출액" class="calc-input">
                            </div>
                            <div class="text-center font-black text-2xl text-slate-400" id="res-roas">0%</div>
                        </div>
                        <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                            <label class="text-[10px] font-bold text-indigo-400 uppercase mb-2 block">목표 매출액 찾기</label>
                            <div class="grid grid-cols-2 gap-2 mb-3">
                                <input id="target-spend" type="number" oninput="calculate()" placeholder="광고비" class="calc-input">
                                <input id="target-roas" type="number" oninput="calculate()" placeholder="목표 ROAS(%)" class="calc-input">
                            </div>
                            <div class="text-right font-black text-xl text-indigo-600" id="res-target-rev">0원</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tool-card">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black">📊 Performance Chart</h2>
                    <button onclick="downloadChart()" class="bg-slate-800 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-black transition-all">PNG 저장</button>
                </div>
                <div id="drop-zone" class="w-full h-48 border-2 border-dashed border-slate-200 rounded-[2rem] flex flex-col items-center justify-center text-slate-400 hover:border-indigo-300 hover:bg-indigo-50 transition cursor-pointer">
                    <span class="text-lg font-bold">리포트 파일을 드래그하거나 클릭하세요</span>
                    <input type="file" id="file-input" multiple class="hidden">
                </div>
                <div id="chart-container" class="h-[400px] hidden">
                    <canvas id="mkt-chart"></canvas>
                </div>
            </div>
        </div>

        <div id="content-manager" class="hidden space-y-6">
            <div class="tool-card">
                <div class="flex flex-col md:flex-row justify-between gap-4 mb-6">
                    <div>
                        <h2 class="text-2xl font-black text-slate-800">📁 Data Manager</h2>
                        <p class="text-sm text-slate-400">파일을 업로드하면 원가율에 맞춰 마진을 자동 계산합니다.</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <label class="text-sm font-bold text-slate-600">고정 원가율(%):</label>
                        <input id="global-cost-rate" type="number" value="30" class="w-20 p-2 bg-slate-50 border rounded-lg font-bold text-center">
                    </div>
                </div>
                
                <div class="overflow-x-auto rounded-2xl border border-slate-100">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-500 font-bold">
                            <tr>
                                <th class="p-4">구분(날짜/매장/제품)</th>
                                <th class="p-4">매출액</th>
                                <th class="p-4">광고비</th>
                                <th class="p-4">ROAS</th>
                                <th class="p-4 text-indigo-600">자동 원가</th>
                                <th class="p-4 text-emerald-600">마진액</th>
                                <th class="p-4 text-emerald-600">마진율</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body" class="divide-y">
                            <tr>
                                <td colspan="7" class="p-10 text-center text-slate-300">데이터를 업로드하면 자동으로 표가 생성됩니다.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 시계 및 기본 설정
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);

        function switchTab(tab) {
            document.getElementById('content-dashboard').classList.toggle('hidden', tab !== 'dashboard');
            document.getElementById('content-manager').classList.toggle('hidden', tab !== 'manager');
            document.getElementById('tab-dashboard').classList.toggle('active', tab === 'dashboard');
            document.getElementById('tab-manager').classList.toggle('active', tab === 'manager');
        }

        // 트렌드 모니터
        function monitor(type) {
            const brand = document.getElementById('search-brand').value;
            if(!brand) return alert('키워드를 입력해주세요!');
            let url = (type === 'blog') ? `https://search.naver.com/search.naver?where=blog&query=${brand}` : (type === 'cafe') ? `https://search.naver.com/search.naver?where=article&query=${brand}` : (type === 'datalab') ? `https://datalab.naver.com/keyword/trendSearch.naver?keywordGroups[0].groupName=${brand}&keywordGroups[0].keywords[0]=${brand}` : `https://www.instagram.com/explore/tags/${brand.replace(/\s/g, '')}/`; window.open(url, '_blank');
        }

        // 통합 계산기 로직
        function calculate() {
            // ROAS 계산
            const spend1 = parseFloat(document.getElementById('roas-spend').value) || 0;
            const rev1 = parseFloat(document.getElementById('roas-revenue').value) || 0;
            const roasRes = document.getElementById('res-roas');
            if(spend1 > 0) {
                const val = (rev1 / spend1) * 100;
                roasRes.innerText = Math.round(val) + '%';
                roasRes.className = val >= 300 ? "text-center font-black text-2xl text-emerald-500" : "text-center font-black text-2xl text-rose-500";
            }

            // 목표 매출 계산
            const spend2 = parseFloat(document.getElementById('target-spend').value) || 0;
            const targetRoas = parseFloat(document.getElementById('target-roas').value) || 0;
            const targetRevRes = document.getElementById('res-target-rev');
            if(spend2 > 0 && targetRoas > 0) {
                targetRevRes.innerText = Math.round(spend2 * (targetRoas/100)).toLocaleString() + '원';
            }
        }

        // 데이터 처리 로직
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        function handleFiles(files) {
            const promises = Array.from(files).map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const workbook = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                        const sheet = workbook.Sheets[workbook.SheetNames[0]];
                        const data = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        resolve(data);
                    };
                    reader.readAsArrayBuffer(file);
                });
            });

            Promise.all(promises).then(allData => {
                const combined = allData.flat();
                updateManagerTable(combined);
                createChart(combined);
            });
        }

        function updateManagerTable(data) {
            const body = document.getElementById('data-table-body');
            const costRate = parseFloat(document.getElementById('global-cost-rate').value) / 100;
            body.innerHTML = '';

            // 헤더 탐색 및 데이터 추출 로직 (매출액, 비용 등 키워드 매칭)
            const headers = data.find(row => row.some(cell => String(cell).includes('매출액') || String(cell).includes('비용') || String(cell).includes('날짜')));
            if (!headers) return;

            const idx = {
                label: headers.findIndex(h => /날짜|매장|제품|시간/.test(h)),
                rev: headers.findIndex(h => /매출액/.test(h)),
                cost: headers.findIndex(h => /비용|광고비/.test(h))
            };

            data.slice(1).forEach(row => {
                if (!row[idx.label]) return;
                const rev = parseFloat(String(row[idx.rev]).replace(/[^0-9.-]+/g, "")) || 0;
                const cost = parseFloat(String(row[idx.cost]).replace(/[^0-9.-]+/g, "")) || 0;
                if (rev === 0 && cost === 0) return;

                const roas = cost > 0 ? Math.round((rev / cost) * 100) : 0;
                const calculatedCost = rev * costRate;
                const marginVal = rev - calculatedCost - cost;
                const marginRate = rev > 0 ? (marginVal / rev) * 100 : 0;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="p-4 font-bold">${row[idx.label]}</td>
                    <td class="p-4">${rev.toLocaleString()}원</td>
                    <td class="p-4 text-slate-400">${cost.toLocaleString()}원</td>
                    <td class="p-4 font-mono font-bold ${roas >= 300 ? 'text-emerald-500' : 'text-rose-400'}">${roas}%</td>
                    <td class="p-4 text-indigo-400">${Math.round(calculatedCost).toLocaleString()}원</td>
                    <td class="p-4 font-bold text-emerald-600">${Math.round(marginVal).toLocaleString()}원</td>
                    <td class="p-4 font-bold text-emerald-600">${Math.round(marginRate)}%</td>
                `;
                body.appendChild(tr);
            });
        }

        let myChart = null;
        function createChart(data) {
            const ctx = document.getElementById('mkt-chart').getContext('2d');
            document.getElementById('chart-container').classList.remove('hidden');
            document.getElementById('drop-zone').classList.add('hidden');

            // 샘플 데이터 시각화 로직 (실제 사용 시 데이터 구조에 맞춰 필터링)
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['01', '02', '03', '04', '05', '06', '07'],
                    datasets: [{
                        label: '매출액',
                        data: [12000, 19000, 3000, 5000, 2000, 3000, 45000],
                        backgroundColor: 'rgba(99, 102, 241, 0.5)',
                        borderRadius: 10
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }
    </script>
</body>
</html>
